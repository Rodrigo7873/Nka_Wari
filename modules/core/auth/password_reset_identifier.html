{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#0f172a] via-[#1e1b4b] to-black p-4">
    <div class="max-w-md w-full animate-fade-in-up">
        <div class="bg-white/10 border border-white/20 rounded-[2.5rem] p-10 shadow-3xl backdrop-blur-2xl">
            <div class="text-center mb-10">
                <div class="inline-block p-4 rounded-3xl bg-indigo-500/10 mb-6">
                    <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        {% if mode == 'tel' %}
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        {% else %}
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" />
                        {% endif %}
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2">Identification</h1>
                <p class="text-gray-400">
                    Saisissez votre {% if mode == 'tel' %}numéro de téléphone{% else %}ID ou Email{% endif %}
                </p>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="mode" value="{{ mode }}">
                <input type="hidden" name="method" value="{{ mode }}">
                
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-300 ml-1">
                        {% if mode == 'tel' %}Votre téléphone{% else %}Votre ID ou Email{% endif %}
                    </label>
                    <input type="text" name="identifier" required
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-gray-600"
                           placeholder="{% if mode == 'tel' %}Ex: +224...{% else %}Ex: DEMBA88 / email@ex.com{% endif %}">
                </div>

                <button type="submit" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-500/30 active:scale-95">
                    Continuer
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="{% url 'core:password_reset_choice' %}" class="text-gray-400 hover:text-white transition-colors text-sm">
                    Choisir une autre méthode
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
