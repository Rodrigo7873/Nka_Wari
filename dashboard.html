<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dashboard | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --brand-green: #009460;
            --brand-yellow: #fcd116;
            --brand-red: #ce1126;
            --bg-dark: #0a0f18;
            --card-glass: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 148, 96, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(252, 209, 22, 0.05) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100dvh;
            overflow-x: hidden;
            line-height: 1.4;
        }

        .app-container {
            padding: 24px 20px 120px 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding-top: 10px;
        }

        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 48px; height: 48px; border-radius: 16px; 
            background: linear-gradient(135deg, var(--brand-green), var(--brand-yellow));
            border: 2px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 20px; color: white;
            box-shadow: 0 8px 16px rgba(0, 148, 96, 0.2);
        }
        .user-info h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .user-info p { font-size: 13px; color: var(--text-sub); }

        .notif-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--card-glass);
            border: 1px solid var(--card-border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
        }
        .notif-dot {
            position: absolute; top: 12px; right: 12px;
            width: 8px; height: 8px; background: var(--brand-red);
            border-radius: 50%; border: 2px solid var(--bg-dark);
        }

        /* Financial Cards */
        .finance-hub {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .main-card {
            width: 100%; height: 200px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .main-card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 28px;
            padding: 30px;
            display: flex; flex-direction: column; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .face-front {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .face-back {
            background: linear-gradient(135deg, var(--brand-green) 0%, #064e3b 100%);
            transform: rotateY(180deg);
            box-shadow: 0 20px 40px rgba(0, 148, 96, 0.2);
        }

        .card-decoration {
            position: absolute; top: -20px; right: -20px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }

        .card-label { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .card-amount { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-top: 5px; }
        .currency { font-size: 18px; font-weight: 600; opacity: 0.7; margin-left: 5px; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .card-chip { width: 45px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 6px; }
        .flip-hint { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); }

        .blurred { filter: blur(10px); transition: filter 0.3s ease; }

        /* Quick Actions */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 15px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }

        .actions-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
            margin-bottom: 35px;
        }

        .action-card {
            background: var(--card-glass);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .action-card:active { transform: scale(0.96); background: rgba(255,255,255,0.05); }

        .action-icon {
            width: 48px; height: 48px; border-radius: 14px;
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
        }

        .icon-green { background: rgba(0, 148, 96, 0.1); color: var(--brand-green); }
        .icon-red { background: rgba(206, 17, 38, 0.1); color: var(--brand-red); }

        .action-card span { display: block; font-weight: 700; font-size: 14px; color: var(--text-main); }

        /* Navigation */
        .smart-nav {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            height: 72px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            z-index: 1000;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            text-decoration: none; color: var(--text-sub);
            padding: 10px; width: 65px;
            transition: all 0.3s ease;
        }

        .nav-item.active { color: var(--brand-green); }
        .nav-item.active svg { transform: translateY(-3px); }
        .nav-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* Reveal Overlay */
        .reveal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; padding: 30px; text-align: center;
        }

        /* Anim */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="user-profile">
                <div class="avatar" id="userInitial">U</div>
                <div class="user-info">
                    <p>Bonjour 👋</p>
                    <h1 id="userName">Utilisateur</h1>
                </div>
            </div>
            <div class="notif-btn" onclick="window.showToast('Pas de nouvelles notifications', 'info')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                <div class="notif-dot"></div>
            </div>
        </div>

        <!-- Section Titre -->
        <div class="section-header">
            <h2 class="section-title">Aperçu du patrimoine</h2>
            <button onclick="toggleVisibility()" id="visibilityBtn" style="background:none; border:none; color:var(--text-sub); cursor:pointer;">
                <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>

        <!-- Cards Showcase -->
        <div class="finance-hub">
            <div class="main-card" id="mainCard" onclick="this.classList.toggle('flipped')">
                <!-- Front : Patrimoine -->
                <div class="card-face face-front">
                    <div class="card-decoration"></div>
                    <div>
                        <div class="card-label">Patrimoine Net</div>
                        <div class="card-amount amount-val blurred" id="netWorth">12 500 000<span class="currency">GNF</span></div>
                    </div>
                    <div class="card-footer">
                        <div class="card-chip"></div>
                        <div class="flip-hint">VOIR LIQUIDITÉS ↻</div>
                    </div>
                </div>
                <!-- Back : Liquidités -->
                <div class="card-face face-back">
                    <div class="card-decoration"></div>
                    <div>
                        <div class="card-label" style="color: rgba(255,255,255,0.8);">Liquidités Totales</div>
                        <div class="card-amount amount-val blurred" id="totalCash">4 200 000<span class="currency">GNF</span></div>
                    </div>
                    <div class="card-footer">
                        <div style="font-weight: 800; font-size: 20px; letter-spacing: 2px;">N'KA WARI</div>
                        <div class="flip-hint">RETOUR ↻</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="section-header">
            <h2 class="section-title">Opérations de terrain</h2>
        </div>
        <div class="actions-grid">
            <div class="action-card" onclick="window.location.href='karfa/add.html'">
                <div class="action-icon icon-green">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
                <span>Nouveau Karfa</span>
            </div>
            <div class="action-card" onclick="window.location.href='dettes/add.html'">
                <div class="action-icon icon-red">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line></svg>
                </div>
                <span>Nouvelle Dette</span>
            </div>
        </div>

        <!-- Gold Price Widget -->
        <div style="background: var(--card-glass); border: 1px solid var(--card-border); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 24px;">
            <div style="width: 44px; height: 44px; background: rgba(252, 209, 22, 0.1); color: var(--brand-yellow); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="8"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            </div>
            <div>
                <div style="font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase;">Cours de l'Or (Fixé)</div>
                <div style="font-size: 18px; font-weight: 800; color: var(--brand-yellow);" id="goldPrice">725 000 GNF <span style="font-size: 12px; opacity:0.8;">/ g</span></div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="smart-nav">
        <a href="dashboard.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Hub</span>
        </a>
        <a href="karfa/list.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><path d="M16 8l-8 8"></path><path d="M8 8l8 8"></path></svg>
            <span>Karfa</span>
        </a>
        <a href="dettes/list.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span>Dettes</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profil</span>
        </a>
    </nav>

    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script>
        let isVisible = false;

        async function initDashboard() {
            const user = await window.checkSession();
            if (user) {
                const name = user.user_metadata?.first_name || "Utilisateur";
                document.getElementById('userName').textContent = name;
                document.getElementById('userInitial').textContent = name.charAt(0).toUpperCase();
                
                // Ici, on chargera les vraies données depuis Supabase
                // Simulé pour le moment
                document.getElementById('netWorth').innerHTML = "12 500 000<span class='currency'>GNF</span>";
                document.getElementById('totalCash').innerHTML = "4 200 000<span class='currency'>GNF</span>";
            }
        }

        function toggleVisibility() {
            isVisible = !isVisible;
            const amounts = document.querySelectorAll('.amount-val');
            const icon = document.getElementById('eyeIcon');
            
            amounts.forEach(a => a.classList.toggle('blurred', !isVisible));
            
            if (isVisible) {
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
