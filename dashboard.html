<!DOCTYPE html>
<html lang="fr" class="theme-clair clair">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Tableau de Bord | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/don.css">
    <link rel="stylesheet" href="css/core.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .finance-showcase { position: relative; max-width: 100%; height: 170px; perspective: 1200px; margin-bottom: 30px; margin-top: 15px; }
        .finance-card-wrapper { width: 100%; height: 100%; position: relative; transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .finance-showcase.flipped .finance-card-wrapper { transform: rotateY(180deg); }
        .finance-card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; padding: 25px 30px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.15); }
        .finance-face-front { background: linear-gradient(135deg, #0f172a 0%, #334155 100%); color: white; }
        .finance-face-back { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; transform: rotateY(180deg); }
        .fc-header { display: flex; justify-content: space-between; align-items: center; }
        .fc-toggle-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 0.85em; display: flex; align-items: center; gap: 6px; }
        .fc-amount { font-size: 2.3em; font-weight: 700; }
        .secret-blurred .fc-amount, .secret-blurred .op-amount, .secret-blurred .gold-price { filter: blur(12px) !important; }
    </style>
</head>
<body class="theme-clair clair">
    <!-- Topbar -->
    <div class="topbar">
        <button class="hamburger" onclick="toggleMenu()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <div class="topbar-right">
            <span class="notification-icon" onclick="toggleNotifications()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            </span>
        </div>
    </div>

    <div class="app-container">
        <!-- Welcome Header -->
        <div class="welcome-header" style="margin-bottom: 30px; margin-top: 10px;">
            <h1 style="font-size: 26px; font-weight: 850; margin: 0;">Bonjour, <span id="userName">Utilisateur</span> 👋</h1>
            <p style="font-size: 14.5px; margin-top: 4px;" class="welcome-subtitle">Ravi de vous revoir sur N'Ka Wari.</p>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 class="section-title" style="margin: 0; font-size: 16px; text-transform: uppercase;">Aperçu financier</h2>
            <button class="btn-icon-light" onclick="toggleAmountsGlobal()">
                <span id="eye-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </span>
            </button>
        </div>

        <!-- Financial Cards (Flip Effect) -->
        <div class="finance-showcase" id="finance-showcase">
            <div class="finance-card-wrapper">
                <div class="finance-card-face finance-face-front">
                    <div class="fc-header">
                        <div class="fc-title">Patrimoine Net</div>
                        <button class="fc-toggle-btn" onclick="flipFinanceCard()">Liquidités →</button>
                    </div>
                    <div class="fc-body">
                        <div class="fc-amount-row secret-val secret-blurred">
                            <span class="fc-amount" id="patrimoineVal">0</span> <span class="fc-currency">GNF</span>
                        </div>
                        <div class="fc-formula">Comptes + Créances - Dettes</div>
                    </div>
                </div>
                <div class="finance-card-face finance-face-back">
                    <div class="fc-header">
                        <div class="fc-title">Liquidités</div>
                        <button class="fc-toggle-btn" onclick="flipFinanceCard()">← Patrimoine</button>
                    </div>
                    <div class="fc-body">
                        <div class="fc-amount-row secret-val secret-blurred">
                            <span class="fc-amount" id="liquiditesVal">0</span> <span class="fc-currency">GNF</span>
                        </div>
                        <div class="fc-formula">Comptes Argent + Karfa</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gold Price -->
        <div class="gold-section" style="background: #fff; padding: 15px 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border: 1.5px solid #e2e8f0;">
            <div class="gold-info secret-val secret-blurred">
                <span style="font-size: 13px; color: #64748b; font-weight: 500;">Prix d'or fixé</span><br>
                <span class="gold-price" style="font-weight: 700; color: #1e293b;" id="goldPriceVal">0 GNF/g</span>
            </div>
            <a href="#" class="gold-btn" style="color: #10b981; font-weight: 700; text-decoration: none; font-size: 14px;">Cours de l'or →</a>
        </div>

        <!-- Actions -->
        <h2 class="section-title">Nouvelles opérations</h2>
        <div class="actions-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
            <a href="karfa/create.html" class="action-card" style="background: #fff; padding: 20px; border-radius: 18px; text-align: center; text-decoration: none; color: inherit; border: 1.5px solid #e2e8f0;">
                <div style="color: #10b981; margin-bottom: 10px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg></div>
                <span style="font-weight: 600; font-size: 14px;">Nouveau karfa</span>
            </a>
            <a href="dettes/create.html" class="action-card" style="background: #fff; padding: 20px; border-radius: 18px; text-align: center; text-decoration: none; color: inherit; border: 1.5px solid #e2e8f0;">
                <div style="color: #ef4444; margin-bottom: 10px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg></div>
                <span style="font-weight: 600; font-size: 14px;">Nouvelle dette</span>
            </a>
        </div>
    </div>

    <!-- Smart Nav -->
    <nav class="smart-nav">
        <a href="dashboard.html" class="nav-item active">
            <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
            <span>Accueil</span>
        </a>
        <a href="karfa/list.html" class="nav-item">
            <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></span>
            <span>Karfa</span>
        </a>
        <a href="dettes/list.html" class="nav-item">
            <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></span>
            <span>Dettes</span>
        </a>
        <a href="comptes/list.html" class="nav-item">
            <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 20 7 4 7"/><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x1="6" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/></svg></span>
            <span>Comptes</span>
        </a>
    </nav>

    <script src="js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkSession();
            if (user) {
                document.getElementById('userName').textContent = user.user_metadata.first_name || user.email.split('@')[0];
                // Simulated fetch
                document.getElementById('patrimoineVal').textContent = "12 500 000";
                document.getElementById('liquiditesVal').textContent = "4 200 000";
                document.getElementById('goldPriceVal').textContent = "650 000 GNF/g";
            }
        });

        function flipFinanceCard() { document.getElementById('finance-showcase').classList.toggle('flipped'); }
        function toggleAmountsGlobal() {
            const vals = document.querySelectorAll('.secret-val');
            const eye = document.getElementById('eye-icon');
            const isHidden = vals[0].classList.toggle('secret-blurred');
            vals.forEach((v, i) => i > 0 && v.classList.toggle('secret-blurred'));
            eye.innerHTML = isHidden ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>` : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
        }
    </script>
</body>
</html>
