<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>N'Ka Wari | Mes Comptes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <style>
        :root {
            --bg-body: #f8fafc;
            --primary-blue: #3b82f6; 
            --text-dark: #1e293b;
            --text-gray: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-body); color: var(--text-dark); padding-bottom: 90px; }

        .max-w { max-width: 500px; margin: 0 auto; }

        /* HEADER */
        .header-top { display: flex; justify-content: space-between; padding: 16px 20px; align-items: center; margin-bottom: 24px; position: sticky; top: 0; background: var(--bg-body); z-index: 100; }
        .icon-btn { background: transparent; border: none; padding: 8px; color: #334155; cursor: pointer; display: flex; align-items: center; }

        /* DASHBOARD TITLE */
        .dashboard-header { text-align: center; margin-bottom: 24px; padding: 0 20px; }
        .dashboard-title { font-size: 24px; font-weight: 800; color: #64748b; letter-spacing: -0.5px; }

        /* ACTIONS */
        .action-container { display: flex; flex-direction: column; gap: 10px; padding: 0 20px; margin-bottom: 24px; align-items: flex-start; }
        .row-actions { display: flex; gap: 10px; align-items: center; width: 100%; }
        
        .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 25px; font-weight: 700; font-size: 13.5px; border: none; cursor: pointer; transition: 0.15s; height: 46px; padding: 0 20px; text-decoration: none; }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .row-actions .btn { flex: 1; }
        
        .btn-green { background: #10b981; color: white; gap: 8px; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3); }
        .btn-blue { background: #3b82f6; color: white; gap: 8px; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3); }

        /* SUMMARY CARDS (Top) */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 0 20px 32px 20px; }
        .category-card { 
            background: #fff; border-radius: 20px; padding: 18px; 
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.02);
            border: 1px solid #f1f5f9;
        }
        .cat-header { display: flex; align-items: center; gap: 8px; }
        .cat-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .bg-blue { background: #eff6ff; color: #3b82f6; }
        .bg-gold { background: #fffbeb; color: #d97706; }
        .cat-label { font-size: 12px; font-weight: 700; color: #64748b; }
        .cat-value { font-size: 18px; font-weight: 800; color: #1e293b; letter-spacing: -0.5px; }
        .cat-unit { font-size: 12px; font-weight: 600; opacity: 0.6; margin-left: 2px; }

        /* ACCOUNT CARDS (List) */
        .accounts-grid { display: grid; grid-template-columns: 1fr; gap: 16px; padding: 0 20px; }
        .flip-card { height: 160px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: left; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 24px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        
        .flip-card-front { background: white; border: 1.5px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .flip-card-back { background: #1e293b; color: white; transform: rotateY(180deg); box-shadow: 0 10px 25px rgba(30, 41, 59, 0.2); }

        .acc-type { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; }
        .acc-name { font-size: 17px; font-weight: 800; color: #1e293b; }
        .acc-balance { font-size: 26px; font-weight: 900; color: #1e293b; letter-spacing: -1px; }
        .acc-balance span { font-size: 14px; font-weight: 700; opacity: 0.5; margin-left: 4px; }

        .acc-actions { display: flex; gap: 10px; }
        .btn-action-small { padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.1); color: white; border: none; flex: 1; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; }
        .btn-delete-small { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; align-items: center; height: 75px; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #94a3b8; gap: 6px; font-size: 10px; font-weight: 700; transition: 0.2s; }
        .nav-item.active { color: #3b82f6; }

        /* OVERLAYS & SIDEBAR */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 150; opacity: 0; pointer-events: none; transition: 0.3s; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .sidebar { position: fixed; top: 0; left: 0; width: 85%; max-width: 310px; height: 100%; background: #fff; z-index: 200; transform: translateX(-100%); transition: 0.3s; }
        .sidebar.active { transform: translateX(0); }
        
        .blur-target.blurred { filter: blur(8px); }
    </style>
</head>
<body>
    <div class="overlay" id="sidebarOverlay" onclick="closeMenu()"></div>
    <div class="sidebar" id="sidebar">
        <!-- Sidebar content -->
        <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center; padding: 24px 20px 16px 20px; border-bottom: 1px solid #f1f5f9;">
            <div class="sidebar-logo-group" style="display: flex; align-items: center; gap: 12px;">
                <div class="sidebar-logo" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: white;">
                    <img src="../images/logo.jpg" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div class="sidebar-title" style="font-size: 17px; font-weight: 800; color: #1e293b;">N'Ka Menu</div>
            </div>
            <button class="icon-btn" onclick="closeMenu()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="sidebar-nav" style="padding: 10px 20px; display: flex; flex-direction: column; gap: 5px;">
            <a href="../dashboard.html" class="sidebar-link" style="display: flex; align-items: center; gap: 16px; padding: 16px 0; text-decoration: none; color: #1e293b; font-size: 15px; font-weight: 600;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Accueil
            </a>
            <a href="list.html" class="sidebar-link" style="display: flex; align-items: center; gap: 16px; padding: 16px 0; text-decoration: none; color: #3b82f6; font-size: 15px; font-weight: 600;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" x2="21" y1="22" y2="22" /><line x1="6" x2="6" y1="18" y2="11" /><line x1="10" x2="10" y1="18" y2="11" /><line x1="14" x2="14" y1="18" y2="11" /><line x1="18" x2="18" y1="18" y2="11" /><polygon points="12 2 20 7 4 7" /></svg> Comptes
            </a>
            <button class="logout-btn" onclick="logout()" style="display: flex; align-items: center; gap: 12px; margin-top: 20px; padding: 14px 20px; background: #fef2f2; border-radius: 12px; color: #ef4444; font-size: 14px; font-weight: 700; border: none; width: 100%; cursor: pointer;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Déconnexion
            </button>
        </div>
    </div>

    <div class="max-w">
        <!-- HEADER TOP -->
        <div class="header-top">
            <button class="icon-btn" onclick="openMenu()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <button class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </button>
        </div>

        <!-- DASHBOARD TITLE -->
        <div class="dashboard-header">
            <h1 class="dashboard-title">Mes Comptes</h1>
        </div>

        <!-- ACTIONS -->
        <div class="action-container">
            <div class="row-actions">
                <a href="javascript:void(0)" onclick="ajouterCompte()" class="btn btn-green">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Nouveau Compte
                </a>
            </div>
        </div>

        <!-- SUMMARY TILES -->
        <div class="summary-grid">
            <div class="category-card">
                <div class="cat-header">
                    <div class="cat-icon bg-blue">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <span class="cat-label">Total Argent</span>
                </div>
                <div class="cat-value blur-target"><span id="sum-argent">0</span> <span class="cat-unit">GNF</span></div>
            </div>
            <div class="category-card">
                <div class="cat-header">
                    <div class="cat-icon bg-gold">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 3h12l4 6-10 12L2 9z"/></svg>
                    </div>
                    <span class="cat-label">Total Or (24k)</span>
                </div>
                <div class="cat-value blur-target"><span id="sum-or">0</span> <span class="cat-unit">g</span></div>
            </div>
        </div>

        <!-- ACCOUNTS GRID -->
        <div class="accounts-grid" id="accounts-container">
            <!-- Chargement... -->
            <div style="text-align: center; color: #94a3b8; font-size: 14px;">Chargement des comptes...</div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="../dashboard.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Accueil</span>
        </a>
        <a href="../karfa/list.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
            <span>Karfa</span>
        </a>
        <a href="../dettes/list.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>Dettes</span>
        </a>
        <a href="list.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="21" y1="22" y2="22" /><line x1="6" x2="6" y1="18" y2="11" /><line x1="10" x2="10" y1="18" y2="11" /><line x1="14" x2="14" y1="18" y2="11" /><line x1="18" x2="18" y1="18" y2="11" /><polygon points="12 2 20 7 4 7" /></svg>
            <span>Comptes</span>
        </a>
    </nav>

    <script>
        function openMenu() { document.getElementById('sidebar').classList.add('active'); document.getElementById('sidebarOverlay').classList.add('active'); }
        function closeMenu() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('sidebarOverlay').classList.remove('active'); }
        function logout() { window.location.replace('../login.html'); }
        function flipCard(el) { el.classList.toggle('flipped'); }

        // CRUD
        window.ajouterCompte = function() { window.location.href = 'add.html'; };
        window.modifierCompte = function(id) { window.location.href = 'add.html?id=' + id; };
        
        window.supprimerCompte = async function(e, id) {
            e.stopPropagation();
            if(!confirm("Supprimer ce compte définitivement ?")) return;
            try {
                const { error } = await window.supabase.from('comptes').delete().eq('id', id);
                if(error) throw error;
                loadComptes();
            } catch(e) { alert("Erreur: " + e.message); }
        };

        async function loadComptes() {
            try {
                // 1. Session
                const { data: { user }, error: userError } = await window.supabase.auth.getUser();
                if (userError || !user) {
                    window.location.replace('../login.html');
                    return;
                }

                // 2. Fetch
                const { data: comptes, error } = await window.supabase
                    .from('comptes')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('type', { ascending: true });

                if (error) throw error;

                const container = document.getElementById('accounts-container');
                let html = '';
                let totalArgent = 0;
                let totalOr = 0;

                const fmt = (v) => new Intl.NumberFormat('fr-FR').format(Math.round(v));

                if (!comptes || comptes.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: #94a3b8; font-size: 14px;">Aucun compte enregistré.</div>';
                    return;
                }

                comptes.forEach(c => {
                    const solde = parseFloat(c.solde) || 0;
                    const isOr = (c.type === 'or');
                    if (isOr) totalOr += solde;
                    else totalArgent += solde;

                    html += `
                    <div class="flip-card" onclick="flipCard(this)">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <div class="acc-type">${isOr ? 'Compte Or 24k' : 'Liquidités'}</div>
                                <div class="acc-name">${c.nom}</div>
                                <div class="acc-balance blur-target">${fmt(solde)} <span>${isOr ? 'g' : 'GNF'}</span></div>
                                <div style="font-size: 11px; color: #94a3b8; font-weight: 500;">Toucher pour gérer</div>
                            </div>
                            <div class="flip-card-back">
                                <div>
                                    <div style="font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase;">Actions</div>
                                    <div style="font-size: 18px; font-weight: 800; margin-top: 4px;">Gérer ce compte</div>
                                </div>
                                <div class="acc-actions">
                                    <button class="btn-action-small" onclick="modifierCompte('${c.id}')">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                        Modifier
                                    </button>
                                    <button class="btn-action-small btn-delete-small" onclick="supprimerCompte(event, '${c.id}')">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                        Supprimer
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                });

                container.innerHTML = html;
                document.getElementById('sum-argent').textContent = fmt(totalArgent);
                document.getElementById('sum-or').textContent = totalOr.toFixed(2).replace('.', ',');

            } catch(err) {
                console.error(err);
                document.getElementById('accounts-container').innerHTML = '<div style="color:red">Erreur.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadComptes);
    </script>
</body>
</html>
