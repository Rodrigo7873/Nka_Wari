<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Tableau de bord | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/don.css">
    <link rel="stylesheet" href="css/core.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .finance-card-face { padding: 25px 30px; border-radius: 20px; color: white; display: flex; flex-direction: column; justify-content: space-between; height: 170px; }
        .finance-face-front { background: linear-gradient(135deg, #0f172a 0%, #334155 100%); }
        .finance-face-back { background: linear-gradient(135deg, #10b981 0%, #059669 100%); display: none; }
        .fc-amount { font-size: 2.6em; font-weight: 700; }
        .secret-blurred .fc-amount { filter: blur(12px); }
    </style>
</head>
<body class="theme-clair clair">
    <div class="topbar" style="display: flex; justify-content: space-between; padding: 15px 20px; background: white; border-bottom: 1px solid #e2e8f0;">
        <button onclick="logoutFromSupabase()" style="background: none; border: none; cursor: pointer;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
        <div class="topbar-right">
            <span class="notification-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /></svg>
            </span>
        </div>
    </div>

    <div class="app-container" style="padding: 20px;">
        <div class="welcome-header" style="margin-bottom: 30px;">
            <h1 style="font-size: 26px; font-weight: 850;">Bonjour, <span id="userName">Utilisateur</span> 👋</h1>
            <p style="color: #64748b;">Ravi de vous revoir sur N'Ka Wari.</p>
        </div>

        <div class="finance-card-face finance-face-front" id="mainCard">
            <div class="fc-header" style="display: flex; justify-content: space-between;">
                <span>Patrimoine Net</span>
                <button onclick="toggleCard()" style="background: rgba(255,255,255,0.1); border: none; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; cursor: pointer;">Switch</button>
            </div>
            <div class="fc-body">
                <div class="fc-amount">--- <span style="font-size: 0.5em;">GNF</span></div>
            </div>
            <div style="font-size: 12px; opacity: 0.8;">Comptes + Créances - Dettes</div>
        </div>

        <div style="margin-top: 30px;">
            <h2 class="section-title" style="font-size: 16px; margin-bottom: 20px;">Nouvelles opérations</h2>
            <div class="actions-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="action-card" style="background: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                    <div style="color: #10b981; margin-bottom: 10px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5v14"/></svg></div>
                    <span style="font-weight: 600;">Nouveau karfa</span>
                </div>
                <div class="action-card" style="background: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                    <div style="color: #ef4444; margin-bottom: 10px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                    <span style="font-weight: 600;">Nouvelle dette</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="smart-nav" style="position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px; background: white; border-top: 1px solid #e2e8f0;">
        <a href="dashboard.html" style="color: #10b981;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg></a>
        <a href="#"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg></a>
        <a href="#"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></a>
        <a href="#"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" x2="21" y1="22" y2="22" /><line x1="6" x2="6" y1="18" y2="11" /><line x1="10" x2="10" y1="18" y2="11" /><line x1="14" x2="14" y1="18" y2="11" /><line x1="18" x2="18" y1="18" y2="11" /><polygon points="12 2 20 7 4 7" /></svg></a>
    </nav>

    <script src="js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkSession();
            if (user) {
                document.getElementById('userName').textContent = user.email.split('@')[0];
            }
        });
        function toggleCard() {
            // Effet simple pour demo
            alert("Switching between Net Worth and Cash...");
        }
    </script>
</body>
</html>
