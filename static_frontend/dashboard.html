<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tableau de Bord | N'Ka Wari</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Styles CSS Statiques -->
    <link rel="stylesheet" href="css/core.css">
    
    <style>
        /* Modern Animated Financial Showcase */
        .finance-showcase {
            position: relative;
            max-width: 100%;
            height: 170px;
            perspective: 1200px;
            margin-bottom: 30px;
            margin-top: 15px;
        }
        .finance-card-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .finance-showcase.flipped .finance-card-wrapper {
            transform: rotateY(180deg);
        }
        .finance-card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 25px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.15);
        }
        .finance-face-front {
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            color: white;
        }
        .finance-face-back {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            transform: rotateY(180deg);
        }
        .fc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .fc-title {
            font-size: 1.15em;
            font-weight: 500;
            opacity: 0.95;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .fc-toggle-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }
        .fc-toggle-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }
        .fc-amount {
            font-size: 2.6em;
            font-weight: 700;
            letter-spacing: -0.5px;
            transition: filter 0.3s ease;
        }
        .fc-currency {
            font-size: 1.1em;
            font-weight: 600;
            opacity: 0.8;
            margin-left: 5px;
        }
        .secret-blurred .fc-amount, 
        .secret-blurred .gold-price {
            filter: blur(12px) !important;
        }
        .gold-section {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
        .gold-btn {
            color: #10b981;
            font-weight: 700;
            text-decoration: none;
            font-size: 14px;
        }
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .action-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 20px;
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s ease;
        }
        .action-card:hover { transform: translateY(-5px); }
        .action-icon { margin-bottom: 10px; }
        .action-title { font-weight: 600; color: #1e2b3c; font-size: 14px; }
        .text-success { color: #10b981; }
        .text-warning { color: #f59e0b; }
        .text-danger { color: #ef4444; }
    </style>
</head>
<body>

    <div class="app-container" style="padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 80px;">
        
        <!-- Welcome Header -->
        <div class="welcome-header" style="margin-bottom: 30px; margin-top: 10px;">
            <h1 style="font-size: 26px; font-weight: 850; margin: 0; color: #1e2b3c;">
                Bonjour, <span id="userName">Utilisateur</span> 👋
            </h1>
            <p style="font-size: 14.5px; font-weight: 500; margin-top: 4px; color: #64748b;">Ravi de vous revoir sur N'Ka Wari.</p>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0; font-size: 16px; text-transform: uppercase; color: #64748b; letter-spacing: 1px;">Aperçu financier</h2>
            <button onclick="toggleVisibility()" style="background:none; border:none; cursor:pointer;" id="eye-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>

        <div class="finance-showcase" id="finance-showcase">
            <div class="finance-card-wrapper">
                <!-- Patrimoine -->
                <div class="finance-card-face finance-face-front">
                    <div class="fc-header">
                        <div class="fc-title">Patrimoine Net</div>
                        <button class="fc-toggle-btn" onclick="flipFinanceCard()">Liquidités ↻</button>
                    </div>
                    <div class="fc-body">
                        <div class="fc-amount-row secret-val secret-blurred">
                            <span class="fc-amount" id="patrimoineVal">0</span><span class="fc-currency">GNF</span>
                        </div>
                        <div style="font-size: 0.9em; opacity: 0.7;">Comptes + Créances - Dettes</div>
                    </div>
                </div>
                <!-- Liquidités -->
                <div class="finance-card-face finance-face-back">
                    <div class="fc-header">
                        <div class="fc-title">Liquidités</div>
                        <button class="fc-toggle-btn" onclick="flipFinanceCard()">Patrimoine ↻</button>
                    </div>
                    <div class="fc-body">
                        <div class="fc-amount-row secret-val secret-blurred">
                            <span class="fc-amount" id="cashVal">0</span><span class="fc-currency">GNF</span>
                        </div>
                        <div style="font-size: 0.9em; opacity: 0.7;">Comptes Argent + Karfa</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Or -->
        <div class="gold-section">
            <div class="secret-val secret-blurred">
                <span style="font-size: 13px; color: #64748b; font-weight: 500;">Prix d'or fixé</span><br>
                <span id="goldPrice" style="font-weight: 700; color: #1e2b3c; font-size: 18px;">0 GNF/g</span>
            </div>
            <a href="#" class="gold-btn">Cours de l'or →</a>
        </div>

        <!-- Actions Rapides -->
        <h2 style="font-size: 15px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 20px;">Nouvelles opérations</h2>
        <div class="actions-grid">
            <a href="javascript:void(0)" onclick="createKarfa()" class="action-card">
                <div class="action-icon text-success">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                </div>
                <span class="action-title">Nouveau karfa</span>
            </a>
            <a href="javascript:void(0)" onclick="createDette()" class="action-card">
                <div class="action-icon text-danger">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
                </div>
                <span class="action-title">Nouvelle dette</span>
            </a>
            <a href="javascript:void(0)" onclick="createCompte()" class="action-card" style="grid-column: span 2;">
                <div class="action-icon text-warning">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </div>
                <span class="action-title">Nouveau compte</span>
            </a>
        </div>
    </div>

    <!-- Scripts JavaScript -->
    <script>
        // Fonctions de redirection centralisées (Principe SRP)
        function createKarfa() { window.location.href = 'karfa/add.html'; }
        function createDette() { window.location.href = 'dettes/add.html'; }
        function createCompte() { window.location.href = 'comptes/add.html'; }

        // Interface interactivité
        function flipFinanceCard() { document.getElementById('finance-showcase').classList.toggle('flipped'); }
        
        let hidden = true;
        function toggleVisibility() {
            hidden = !hidden;
            document.querySelectorAll('.secret-val').forEach(el => el.classList.toggle('secret-blurred', hidden));
            const icon = document.getElementById('eye-icon');
            icon.innerHTML = hidden 
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
        }

        // Initialisation Statique
        document.addEventListener('DOMContentLoaded', () => {
            // Ici nous mettrons la logique de récupération de session plus tard
            document.getElementById('patrimoineVal').textContent = "---";
            document.getElementById('cashVal').textContent = "---";
            document.getElementById('goldPrice').textContent = "650 000 GNF/g";
        });
    </script>
</body>
</html>
