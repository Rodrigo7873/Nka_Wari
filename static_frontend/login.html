<!DOCTYPE html>
<html lang="fr" class="theme-clair clair">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Connexion | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/core.css">
    <style>
        /* Ajustements pour affichage sur une seule page sans scroll */
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Empêche le scroll global */
        }
        .app-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 20px;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s ease-out;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-wrapper:focus-within {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</head>
<body class="theme-clair clair">
    <div class="app-container">
        <div class="login-wrapper">
            <div class="login-card">
                <div class="login-header" style="display: flex; flex-direction: column; align-items: center; margin-bottom: 30px;">
                    <img src="images/logo.jpg" alt="Logo N'Ka Wari" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid #10b981; padding: 2px; object-fit: contain; background: white; margin-bottom: 15px;">
                    <h1 class="brand-name" style="font-size: 28px; font-weight: 800; color: #1e293b; margin: 0;">N'Ka Wari</h1>
                    <p class="brand-subtitle" style="color: #64748b; font-size: 14px; margin-top: 5px;">Votre partenaire financier de confiance</p>
                </div>

                <form class="login-form" id="loginForm">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label id="input-label" style="display: block; font-weight: 600; color: #334155; margin-bottom: 8px; font-size: 14px;">Numéro de téléphone</label>
                        <div class="input-wrapper" id="smart-input-wrapper" style="display: flex; align-items: center; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 14px; height: 56px; overflow: hidden; transition: all 0.2s;">
                            <!-- Préfixe téléphone -->
                            <div class="tel-prefix-inline" id="tel-prefix" style="display: flex; align-items: center; gap: 8px; padding: 0 16px; background: #fff; border-right: 1px solid #e2e8f0; height: 100%;">
                                <svg width="20" height="14" viewBox="0 0 3 2"><rect width="1" height="2" fill="#ce1126"/><rect x="1" width="1" height="2" fill="#fcd116"/><rect x="2" width="1" height="2" fill="#009460"/></svg>
                                <span style="font-weight: 700; color: #475569; font-size: 15px;">+224</span>
                            </div>
                            <!-- Icône ID -->
                            <span id="mode-icon-id" style="display: none; padding-left: 16px; color: #94a3b8;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            </span>
                            
                            <input type="text" id="login_value" required placeholder="620 00 00 00" style="flex: 1; border: none; outline: none; padding: 0 16px; font-size: 16px; background: transparent; color: #1e293b; font-weight: 500;">
                            
                            <button type="button" onclick="toggleLoginMode()" style="background: none; border: none; padding: 0 16px; cursor: pointer; color: #94a3b8; transition: color 0.2s;" onmouseover="this.style.color='#10b981'" onmouseout="this.style.color='#94a3b8'">
                                <span id="toggle-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"></rect><line x1="7" y1="8" x2="17" y2="8"></line><line x1="7" y1="12" x2="17" y2="12"></line><line x1="7" y1="16" x2="13" y2="16"></line></svg>
                                </span>
                            </button>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 10px;">
                        <label style="display: block; font-weight: 600; color: #334155; margin-bottom: 8px; font-size: 14px;">Mot de passe</label>
                        <div class="input-wrapper" style="display: flex; align-items: center; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 14px; height: 56px; transition: all 0.2s;">
                            <span style="padding-left: 16px; color: #94a3b8;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                            <input type="password" id="password" required placeholder="••••••••" style="flex: 1; border: none; outline: none; padding: 0 16px; font-size: 16px; background: transparent; color: #1e293b; font-weight: 500;">
                            <button type="button" onclick="togglePassword()" style="background: none; border: none; padding: 0 16px; cursor: pointer; color: #94a3b8; transition: color 0.2s;" onmouseover="this.style.color='#10b981'" onmouseout="this.style.color='#94a3b8'">
                                <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>

                    <div style="text-align: right; margin-bottom: 25px;">
                        <a href="#" style="color: #64748b; font-size: 13px; text-decoration: none; font-weight: 500;">Mot de passe oublié ?</a>
                    </div>

                    <button type="submit" id="loginBtn" style="width: 100%; height: 56px; background: #10b981; color: white; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);">Se connecter</button>
                </form>

                <div class="login-footer" style="margin-top: 30px; text-align: center;">
                    <p style="color: #64748b; font-size: 14px;">Pas de compte ? <a href="register.html" style="color: #10b981; font-weight: 700; text-decoration: none; margin-left: 5px;">Créer un compte</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'tel';
        const valInput = document.getElementById('login_value');

        function toggleLoginMode() {
            const label = document.getElementById('input-label');
            const prefix = document.getElementById('tel-prefix');
            const iconId = document.getElementById('mode-icon-id');
            
            valInput.value = "";
            if (currentMode === 'tel') {
                currentMode = 'id';
                label.innerText = "Identifiant Professionnel";
                prefix.style.display = 'none';
                iconId.style.display = 'flex';
                valInput.placeholder = "Ex: RASI186857";
            } else {
                currentMode = 'tel';
                label.innerText = "Numéro de téléphone";
                prefix.style.display = 'flex';
                iconId.style.display = 'none';
                valInput.placeholder = "620 00 00 00";
            }
        }

        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                passInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        valInput.addEventListener('input', (e) => {
            if (currentMode === 'tel') {
                let val = e.target.value.replace(/\D/g, '').substring(0, 9);
                let f = "";
                if (val.length > 0) f = val.substring(0,3);
                if (val.length > 3) f += " " + val.substring(3,5);
                if (val.length > 5) f += " " + val.substring(5,7);
                if (val.length > 7) f += " " + val.substring(7,9);
                e.target.value = f;
            } else { e.target.value = e.target.value.toUpperCase(); }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            let val = valInput.value;
            const pass = document.getElementById('password').value;
            if (currentMode === 'tel') { val = "+224" + val.replace(/\s/g, ''); }

            btn.disabled = true; 
            btn.style.opacity = "0.7";
            btn.textContent = 'Connexion en cours...';

            try {
                await window.signInWithSupabase(val, pass);
                window.showToast("Connexion réussie !", "success");
            } catch (err) {
                window.showToast(err.message, "error");
                btn.disabled = false; 
                btn.style.opacity = "1";
                btn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
