<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Inscription | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/core.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="theme-clair clair">
    <div class="app-container">
        <div class="login-wrapper">
            <div class="login-card">
                <div class="login-header" style="display: flex; flex-direction: column; align-items: center;">
                    <img src="images/logo.jpg" alt="Logo N'Ka Wari" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 12px; border: 2px solid white; object-fit: contain; background: white;">
                    <h1 class="brand-name">N'Ka Wari</h1>
                    <p class="brand-subtitle">Créez votre compte de gestion</p>
                </div>

                <div class="alert-container" id="alertContainer" style="display: none;">
                    <div class="alert alert-error" id="errorMessage" style="background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px;"></div>
                </div>

                <form class="login-form" id="registerForm">
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            </span>
                            <input type="email" id="email" required placeholder="votre@email.com" style="padding-left: 48px; width: 100%; height: 50px; border-radius: 12px; border: 1px solid #e2e8f0;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <label>Mot de passe</label>
                        <div class="input-wrapper" style="position: relative;">
                            <span class="input-icon" style="position: absolute; left: 16px; top: 15px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </span>
                            <input type="password" id="password" required placeholder="Min. 6 caractères" style="padding-left: 48px; width: 100%; height: 50px; border-radius: 12px; border: 1px solid #e2e8f0;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <label>Confirmer</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                            </span>
                            <input type="password" id="passwordConfirm" required placeholder="Reprendre le mot de passe" style="padding-left: 48px; width: 100%; height: 50px; border-radius: 12px; border: 1px solid #e2e8f0;">
                        </div>
                    </div>

                    <button type="submit" class="btn-login-premium" id="registerBtn" style="width: 100%; margin-top: 30px; height: 55px; background: #10b981; color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer;">
                        Finaliser l'inscription
                    </button>
                </form>

                <div class="login-footer" style="margin-top: 25px; text-align: center; color: #64748b;">
                    <p>Déjà inscrit ? <a href="login.html" style="color: #10b981; font-weight: 600; text-decoration: none;">Se connecter</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="js/supabase.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('passwordConfirm').value;
            const btn = document.getElementById('registerBtn');

            if (pass !== confirm) {
                alert("Les mots de passe ne correspondent pas.");
                return;
            }

            btn.disabled = true; btn.textContent = 'Création...';
            try {
                await signUpWithSupabase(email, pass);
                alert("Compte créé ! Vérifiez vos emails si nécessaire.");
            } catch (err) {
                document.getElementById('errorMessage').textContent = err.message;
                document.getElementById('alertContainer').style.display = 'block';
                btn.disabled = false; btn.textContent = "S'inscrire";
            }
        });
    </script>
</body>
</html>
