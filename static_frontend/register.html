<!DOCTYPE html>
<html lang="fr" class="theme-clair clair">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Inscription | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/core.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #ffffff; /* Fond blanc par défaut pour mobile */
        }
        .app-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc; /* Fond gris léger pour ordinateur */
        }
        .login-wrapper {
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: slideUp 0.4s ease-out;
        }
        .login-card {
            background: #ffffff;
            width: 100%;
            padding: 30px;
            box-sizing: border-box;
        }

        /* Styles PC : On garde l'effet de carte centrée */
        @media (min-width: 768px) {
            .app-container { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); }
            .login-card {
                border-radius: 28px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
                border: 1px solid #e2e8f0;
            }
            .login-wrapper { height: auto; }
        }

        /* Styles Mobile : Plein écran */
        @media (max-width: 767px) {
            .app-container { background: #ffffff; padding: 0; }
            .login-card { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 25px; }
            .login-wrapper { max-width: 100%; }
        }

        .register-step { display: none; }
        .register-step.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform: scale(0.98); } to { opacity:1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .wizard-progress { display: flex; gap: 8px; margin: 20px 0; justify-content: center; }
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0; }
        .progress-dot.active { background: #10b981; transform: scale(1.3); }
        .progress-dot.completed { background: #10b981; }
        
        .form-group label { display: block; font-weight: 700; color: #1e293b; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-box { width: 100%; height: 52px; border-radius: 14px; border: 2px solid #f1f5f9; padding: 0 16px; font-size: 16px; color: #1e293b; background: #f8fafc; transition: all 0.2s; box-sizing: border-box; }
        .input-box:focus { border-color: #10b981; outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        
        .btn-primary { width: 100%; height: 54px; background: #10b981; color: white; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); margin-top: 20px; }
        .btn-secondary { height: 54px; background: #fff; color: #64748b; border: 2px solid #f1f5f9; border-radius: 14px; font-weight: 600; font-size: 15px; cursor: pointer; }
        
        .id-card { background: #f8fafc; border: 2px dashed #10b981; border-radius: 20px; padding: 25px; margin: 25px 0; text-align: center; }
        .id-value { font-size: 32px; font-weight: 800; color: #1e293b; letter-spacing: 2px; margin: 10px 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</head>
<body class="theme-clair clair">
    <div class="app-container">
        <div class="login-wrapper">
            <div class="login-card">
                <div id="registrationHeader" style="text-align: center;">
                    <img src="images/logo.jpg" alt="Logo" style="width: 70px; height: 70px; border-radius: 50%; border: 3px solid #10b981; padding: 2px; background: #fff; margin-bottom: 15px;">
                    <h1 style="font-size: 24px; font-weight: 900; color: #1e293b; margin: 0;">Inscription</h1>
                    <p style="color: #64748b; font-size: 14px; margin-top: 5px;">Créez votre profil N'Ka Wari</p>
                    
                    <div class="wizard-progress">
                        <div class="progress-dot active" id="dot1"></div>
                        <div class="progress-dot" id="dot2"></div>
                        <div class="progress-dot" id="dot3"></div>
                    </div>
                </div>

                <form id="registerWizard">
                    <!-- Étape 1 : Identité -->
                    <div class="register-step active" id="step1">
                        <div class="form-group">
                            <label>Prénom</label>
                            <input type="text" id="first_name" required placeholder="Ex: Moussa" class="input-box">
                        </div>
                        <div class="form-group" style="margin-top: 15px;">
                            <label>Nom</label>
                            <input type="text" id="last_name" required placeholder="Ex: Camara" class="input-box">
                        </div>
                        <button type="button" onclick="goToNextStep(2)" class="btn-primary">Continuer</button>
                    </div>

                    <!-- Étape 2 : Sécurité -->
                    <div class="register-step" id="step2">
                        <div class="form-group">
                            <label>Question Secrète</label>
                            <select id="secret_question" class="input-box">
                                <option value="equipe">Votre équipe préférée ?</option>
                                <option value="ecole">Le nom de votre première école ?</option>
                                <option value="animal">Le nom de votre premier animal ?</option>
                                <option value="ville">Votre ville de naissance ?</option>
                                <option value="mere">Le nom de jeune fille de votre mère ?</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-top: 15px;">
                            <label>Réponse Secrète</label>
                            <input type="text" id="secret_answer" required placeholder="Votre réponse" class="input-box">
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 15px;">
                            <button type="button" onclick="nextStep(1)" class="btn-secondary" style="flex: 1;">Retour</button>
                            <button type="button" onclick="goToNextStep(3)" class="btn-primary" style="flex: 2; margin-top: 0;">Suivant</button>
                        </div>
                    </div>

                    <!-- Étape 3 : Finalisation -->
                    <div class="register-step" id="step3">
                        <div class="form-group">
                            <label>Numéro de téléphone</label>
                            <input type="tel" id="phone" required placeholder="620 00 00 00" class="input-box">
                        </div>
                        <div class="form-group" style="margin-top: 15px;">
                            <label>Mot de passe</label>
                            <input type="password" id="password" required placeholder="Min. 8 caractères" class="input-box">
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 25px;">
                            <button type="button" onclick="nextStep(2)" class="btn-secondary" style="flex: 1;">Retour</button>
                            <button type="submit" id="finishBtn" class="btn-primary" style="flex: 2; margin-top: 0;">Terminer</button>
                        </div>
                    </div>
                </form>

                <!-- Étape 4 : Succès -->
                <div class="register-step" id="step4">
                    <div style="text-align: center;">
                        <div style="width: 80px; height: 80px; background: #dcfce7; color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px;">✓</div>
                        <h2 style="font-weight: 900; color: #1e293b; margin: 0;">Félicitations !</h2>
                        
                        <div class="id-card">
                            <p style="text-transform: uppercase; font-size: 12px; font-weight: 700; color: #64748b; letter-spacing: 1px; margin: 0;">Votre ID de connexion</p>
                            <div class="id-value" id="displayID">------</div>
                            <p style="font-size: 13px; color: #ef4444; font-weight: 600; margin: 0;">⚠️ Notez-le, il est indispensable !</p>
                        </div>

                        <button onclick="window.location.href='login.html'" class="btn-primary" style="background: #1e293b; margin-top: 0;">Se connecter</button>
                    </div>
                </div>

                <div id="loginLink" style="margin-top: 25px; text-align: center; font-size: 15px; color: #64748b;">
                    Déjà inscrit ? <a href="login.html" style="color: #10b981; font-weight: 700; text-decoration: none; margin-left: 5px;">Se connecter</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.register-step').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('step' + step);
            if (target) target.classList.add('active');
            document.querySelectorAll('.progress-dot').forEach((dot, index) => {
                if (index < step) dot.classList.add('completed'); else dot.classList.remove('completed');
                if (index === step - 1) dot.classList.add('active'); else dot.classList.remove('active');
            });
        }

        function genererID(nom, prenom) {
            const n = nom.trim().replace(/\s/g, '').toUpperCase();
            const p = prenom.trim().replace(/\s/g, '').toUpperCase();
            const pNom = n.length >= 2 ? n.slice(-2) : n;
            const pPrenom = p.length >= 2 ? p.slice(0, 2) : p;
            const chiffres = Math.floor(100000 + Math.random() * 900000);
            return pNom + pPrenom + chiffres;
        }

        function goToNextStep(step) {
            const currentStepNum = step - 1;
            const container = document.getElementById('step' + currentStepNum);
            const inputs = container.querySelectorAll('input[required], select[required]');
            let isValid = true;
            inputs.forEach(input => {
                if (!input.value.trim()) { input.style.borderColor = '#ef4444'; isValid = false; }
                else { input.style.borderColor = '#f1f5f9'; }
            });
            if (isValid) nextStep(step);
            else window.showToast("Remplissez tous les champs obligatoires.", "warning");
        }

        document.getElementById('registerWizard').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('finishBtn');
            btn.disabled = true; btn.textContent = "Création...";
            const prenom = document.getElementById('first_name').value;
            const nom = document.getElementById('last_name').value;
            const phoneVal = document.getElementById('phone').value.replace(/\s/g, '');
            const phoneWithPrefix = phoneVal.startsWith('+224') ? phoneVal : '+224' + phoneVal;
            const generatedID = genererID(nom, prenom);
            const technicalEmail = `${generatedID}@nkawari.local`;
            try {
                const { data, error } = await window.supabase.auth.signUp({
                    email: technicalEmail, password: document.getElementById('password').value, options: { data: { full_name: prenom + " " + nom } }
                });
                if (error) throw error;
                if (data.user) {
                    await window.supabase.from('profiles').insert({
                        id: data.user.id, identifiant: generatedID, phone: phoneWithPrefix, email: technicalEmail, full_name: prenom + " " + nom
                    });
                }
                document.getElementById('displayID').textContent = generatedID;
                document.getElementById('registrationHeader').style.display = 'none';
                document.getElementById('loginLink').style.display = 'none';
                document.getElementById('registerWizard').style.display = 'none';
                nextStep(4);
                window.showToast("Compte créé !", "success");
            } catch(err) {
                window.showToast(err.message, "error");
                btn.disabled = false; btn.textContent = "Terminer";
            }
        });
    </script>
</body>
</html>
