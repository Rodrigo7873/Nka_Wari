<!DOCTYPE html>
<html lang="fr" class="theme-clair clair">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Inscription | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/core.css">
    <style>
        :root {
            --brand-green: #10b981;
            --page-bg: #f9fafb;
            --text-main: #1e2b3c;
            --text-sub: #4b5563;
            --border-soft: #e2e8f0;
        }

        body, html {
            min-height: 100%;
            margin: 0;
            background: var(--page-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-wrapper {
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.4s ease-out;
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            padding: 40px;
            box-sizing: border-box;
            border-radius: 28px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-soft);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Desktop specific adjustments */
        @media (min-width: 768px) {
            .logo-img { width: 100px !important; height: 100px !important; margin-bottom: 20px !important; }
            .login-card { box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05); padding: 50px 45px; }
        }

        @media (max-width: 767px) {
            .app-container { padding: 0; align-items: flex-start; background: #ffffff; }
            .login-card { border-radius: 0; border: none; box-shadow: none; padding: 30px 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
            .login-wrapper { max-width: 100%; }
            .logo-img { width: 80px; height: 80px; }
        }

        .register-step { display: none; }
        .register-step.active { display: block; animation: fadeIn 0.3s ease-out; }
        
        .wizard-progress { display: flex; gap: 8px; margin: 25px 0; justify-content: center; }
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0; }
        .progress-dot.active { background: var(--brand-green); transform: scale(1.3); }
        .progress-dot.completed { background: var(--brand-green); }
        
        .form-group label { display: block; font-weight: 700; color: var(--text-main); margin-bottom: 12px; font-size: 14px; }
        .input-box { width: 100%; height: 56px; border-radius: 14px; border: 1.5px solid var(--border-soft); padding: 0 16px; font-size: 16px; color: var(--text-main); background: #f9fafb; transition: all 0.2s; box-sizing: border-box; }
        .input-box:focus { border-color: var(--brand-green); outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08); }
        
        .btn-primary { width: 100%; height: 56px; background: var(--brand-green); color: white; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); margin-top: 25px; }
        .btn-secondary { height: 56px; background: #fff; color: var(--text-sub); border: 2.5px solid #f8fafc; border-radius: 14px; font-weight: 600; font-size: 15px; cursor: pointer; }
        
        .id-card { background: #f9fafb; border: 2px dashed var(--brand-green); border-radius: 20px; padding: 25px; margin: 25px 0; text-align: center; }
        .id-value { font-size: 32px; font-weight: 850; color: var(--text-main); letter-spacing: 2px; margin: 10px 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</head>
<body class="theme-clair clair">
    <div class="app-container">
        <div class="login-wrapper">
            <div class="login-card">
                <div id="registrationHeader" style="text-align: center;">
                    <!-- Logo Style Raffiné -->
                    <img src="images/logo.jpg" alt="Logo" class="logo-img" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 10px 15px -3px rgba(0, 0, 0, 0.1); object-fit: contain; background: #fff; margin-bottom: 20px; transition: all 0.3s ease;">
                    <h1 style="font-size: 26px; font-weight: 900; color: var(--text-main); margin: 0; letter-spacing: -0.5px;">Inscription</h1>
                    <p style="color: var(--text-sub); font-size: 15px; margin-top: 5px;">Créez votre profil de gestion</p>
                    
                    <div class="wizard-progress">
                        <div class="progress-dot active" id="dot1"></div>
                        <div class="progress-dot" id="dot2"></div>
                        <div class="progress-dot" id="dot3"></div>
                    </div>
                </div>

                <form id="registerWizard">
                    <!-- Étape 1 : Identité -->
                    <div class="register-step active" id="step1">
                        <div class="form-group"><label>Prénom</label><input type="text" id="first_name" required placeholder="Ex: Moussa" class="input-box"></div>
                        <div class="form-group" style="margin-top: 15px;"><label>Nom</label><input type="text" id="last_name" required placeholder="Ex: Camara" class="input-box"></div>
                        <button type="button" onclick="goToNextStep(2)" class="btn-primary">Suivant</button>
                    </div>

                    <!-- Étape 2 : Sécurité -->
                    <div class="register-step" id="step2">
                        <div class="form-group"><label>Question Secrète</label><select id="secret_question" class="input-box"><option value="equipe">Votre équipe préférée ?</option><option value="ecole">Le nom de votre première école ?</option><option value="animal">Le nom de votre premier animal ?</option><option value="ville">Votre ville de naissance ?</option><option value="mere">Le nom de jeune fille de votre mère ?</option></select></div>
                        <div class="form-group" style="margin-top: 15px;"><label>Réponse Secrète</label><input type="text" id="secret_answer" required placeholder="Votre réponse" class="input-box"></div>
                        <div style="display: flex; gap: 10px; margin-top: 20px;"><button type="button" onclick="nextStep(1)" class="btn-secondary" style="flex: 1;">Retour</button><button type="button" onclick="goToNextStep(3)" class="btn-primary" style="flex: 2; margin-top: 0;">Suivant</button></div>
                    </div>

                    <!-- Étape 3 : Finalisation -->
                    <div class="register-step" id="step3">
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label>Numéro de téléphone</label>
                            <div class="input-wrapper">
                                <div style="display: flex; align-items: center; gap: 8px; padding: 0 16px; background: #f9fafb; border-right: 1.5px solid var(--border-soft); height: 100%;">
                                    <svg width="20" height="14" viewBox="0 0 3 2"><rect width="1" height="2" fill="#ce1126"/><rect x="1" width="1" height="2" fill="#fcd116"/><rect x="2" width="1" height="2" fill="#009460"/></svg>
                                    <span style="font-weight: 800; color: var(--text-main); font-size: 15px;">+224</span>
                                </div>
                                <input type="tel" id="phone" required placeholder="620 00 00 00" class="input-clean">
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label>Mot de passe</label>
                            <div class="input-wrapper">
                                <span style="padding-left: 18px; color: #94a3b8;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                                <input type="password" id="password" required placeholder="Min. 8 caractères" class="input-clean">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Confirmer le mot de passe</label>
                            <div class="input-wrapper">
                                <span style="padding-left: 18px; color: #94a3b8;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></span>
                                <input type="password" id="confirm_password" required placeholder="Répétez le mot de passe" class="input-clean">
                            </div>
                        </div>

                        <div style="display: flex; gap: 10px; margin-top: 30px;">
                            <button type="button" onclick="nextStep(2)" class="btn-secondary" style="flex: 1;">Retour</button>
                            <button type="submit" id="finishBtn" class="btn-primary" style="flex: 2; margin-top: 0;">Confirmer</button>
                        </div>
                    </div>
                </form>

                <div class="register-step" id="step4"><div style="text-align: center;"><div style="width: 80px; height: 80px; background: #dcfce7; color: var(--brand-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 35px;">✓</div><h2 style="font-weight: 900; color: var(--text-main); margin: 0;">Félicitations !</h2><div class="id-card"><p style="font-size: 13px; font-weight: 700; color: var(--text-sub); margin: 0;">Votre Identifiant Unique</p><div class="id-value" id="displayID">------</div></div><button onclick="window.location.href='login.html'" class="btn-primary" style="background: var(--text-main); margin-top: 0;">Vers la connexion</button></div></div>

                <div id="loginLink" style="margin-top: 30px; text-align: center; font-size: 15px; color: var(--text-sub);">Déjà un compte ? <a href="login.html" style="color: var(--brand-green); font-weight: 700; text-decoration: none; margin-left: 5px;">Se connecter</a></div>
            </div>
        </div>
    </div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.register-step').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('step' + step);
            if (target) target.classList.add('active');
            document.querySelectorAll('.progress-dot').forEach((dot, index) => {
                if (index < step) dot.classList.add('completed'); else dot.classList.remove('completed');
                if (index === step - 1) dot.classList.add('active'); else dot.classList.remove('active');
            });
        }
        function genererID(nom, prenom) {
            const n = nom.trim().replace(/\s/g, '').toUpperCase();
            const p = prenom.trim().replace(/\s/g, '').toUpperCase();
            return (n.length >= 2 ? n.slice(-2) : n) + (p.length >= 2 ? p.slice(0, 2) : p) + Math.floor(100000 + Math.random() * 900000);
        }
        function goToNextStep(step) {
            const container = document.getElementById('step' + (step - 1));
            const inputs = container.querySelectorAll('input[required], select[required]');
            let isValid = true;
            inputs.forEach(i => { if (!i.value.trim()) { i.style.borderColor = '#ef4444'; isValid = false; } else { i.style.borderColor = '#e2e8f0'; } });
            if (isValid) nextStep(step); else window.showToast("Remplissez tous les champs.", "warning");
        }

        document.getElementById('phone').addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '').substring(0, 9);
            let f = "";
            if (val.length > 0) f = val.substring(0, 3);
            if (val.length > 3) f += " " + val.substring(3, 5);
            if (val.length > 5) f += " " + val.substring(5, 7);
            if (val.length > 7) f += " " + val.substring(7, 9);
            e.target.value = f;
        });

        document.getElementById('registerWizard').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('finishBtn');
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (pass !== confirm) {
                window.showToast("Les mots de passe ne correspondent pas.", "error");
                return;
            }

            if (pass.length < 8) {
                window.showToast("Le mot de passe doit faire au moins 8 caractères.", "warning");
                return;
            }

            btn.disabled = true; btn.textContent = "Traitement...";
            const prenom = document.getElementById('first_name').value;
            const nom = document.getElementById('last_name').value;
            const phoneVal = document.getElementById('phone').value.replace(/\s/g, '');
            const generatedID = genererID(nom, prenom);
            const technicalEmail = `${generatedID}@nkawari.local`;
            try {
                const { data, error } = await window.supabase.auth.signUp({ 
                    email: technicalEmail, 
                    password: pass, 
                    options: { data: { full_name: prenom + " " + nom } } 
                });
                if (error) throw error;
                if (data.user) { 
                    await window.supabase.from('profiles').insert({ 
                        id: data.user.id, 
                        identifiant: generatedID, 
                        phone: '+224' + phoneVal, 
                        email: technicalEmail, 
                        full_name: prenom + " " + nom 
                    }); 
                }
                document.getElementById('displayID').textContent = generatedID;
                document.getElementById('registrationHeader').style.display = 'none';
                document.getElementById('loginLink').style.display = 'none';
                document.getElementById('registerWizard').style.display = 'none';
                nextStep(4); window.showToast("Compte créé !", "success");
            } catch(err) { window.showToast(err.message, "error"); btn.disabled = false; btn.textContent = "Confirmer"; }
        });
    </script>
</body>
</html>
