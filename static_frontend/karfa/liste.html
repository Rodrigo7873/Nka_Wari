<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>N'Ka Wari | Tous les Karfa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <style>
        :root {
            --bg-body: #f8fafc;
            --primary-blue: #3b82f6; 
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --border-gray: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-body); color: var(--text-dark); padding-bottom: 90px; }

        .max-w { max-width: 500px; margin: 0 auto; }

        /* HEADER */
        .header-top { display: flex; justify-content: space-between; padding: 16px 20px; align-items: center; margin-bottom: 24px; position: sticky; top: 0; background: var(--bg-body); z-index: 100; }
        .icon-btn { background: transparent; border: none; padding: 8px; color: #334155; cursor: pointer; display: flex; align-items: center; }

        /* PAGE HEADER */
        .page-header { text-align: center; padding: 0 24px; margin-bottom: 30px; }
        .page-title { font-size: 26px; font-weight: 800; color: #1e293b; margin-bottom: 8px; letter-spacing: -0.8px; }
        .page-subtitle { font-size: 14px; color: #64748b; font-weight: 500; }

        /* NAV BUTTONS */
        .nav-buttons { display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .pill-btn {
            background: #fff; border: 1.5px solid #f1f5f9; border-radius: 25px;
            padding: 10px 24px; font-size: 14px; font-weight: 700; color: #64748b;
            display: flex; align-items: center; gap: 8px; cursor: pointer; text-decoration: none;
        }

        /* KARFA LIST */
        .karfa-list { padding: 0 20px; display: flex; flex-direction: column; gap: 16px; }
        .karfa-card {
            background: #fff; border-radius: 22px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid rgba(0,0,0,0.01);
            cursor: pointer; transition: transform 0.1s;
        }
        .karfa-card:active { transform: scale(0.98); }
        .karfa-left { display: flex; align-items: center; gap: 16px; }
        .user-avatar {
            width: 48px; height: 48px; border-radius: 50%; background: #eff6ff;
            display: flex; align-items: center; justify-content: center; color: #3b82f6;
        }
        .karfa-info { display: flex; flex-direction: column; gap: 4px; }
        .karfa-name { font-size: 15px; font-weight: 800; color: #1e293b; }
        .karfa-meta { font-size: 12px; color: #94a3b8; font-weight: 500; }

        .karfa-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .karfa-amount { font-size: 14px; font-weight: 800; color: #4f46e5; }
        .status-badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px; }
        .status-actif { background: #eff6ff; color: #3b82f6; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; align-items: center; height: 75px; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #94a3b8; gap: 6px; font-size: 10px; font-weight: 700; transition: 0.2s; }
        .nav-item.active { color: #3b82f6; }

        /* SIDEBAR & OVERLAY */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 150; opacity: 0; pointer-events: none; transition: 0.3s; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .sidebar { position: fixed; top: 0; left: 0; width: 85%; max-width: 310px; height: 100%; background: #fff; z-index: 200; transform: translateX(-100%); transition: 0.3s; box-shadow: 5px 0 25px rgba(0,0,0,0.05); }
        .sidebar.active { transform: translateX(0); }
        
        .loading-state { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeMenu()"></div>
    <div class="sidebar" id="sidebar"></div>

    <div class="max-w">
        <!-- HEADER -->
        <div class="header-top">
            <button class="icon-btn" onclick="openMenu()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <button class="icon-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </button>
        </div>

        <!-- PAGE TITLE -->
        <div class="page-header">
            <h1 class="page-title">Tous les Karfa (Dépôts)</h1>
            <p class="page-subtitle">Liste complète de l'argent qui vous est confié.</p>
        </div>

        <!-- NAV BUTTONS -->
        <div class="nav-buttons">
            <a href="list.html" class="pill-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Retour
            </a>
            <a href="#" class="pill-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
                Archives
            </a>
        </div>

        <!-- KARFA LIST -->
        <div class="karfa-list" id="karfa-full-list">
            <div class="loading-state">Récupération de la liste...</div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="../dashboard.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Accueil</span>
        </a>
        <a href="list.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
            <span>Karfa</span>
        </a>
        <a href="../dettes/list.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>Dettes</span>
        </a>
        <a href="../comptes/list.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M3 10h18"/><path d="M5 10v11"/><path d="M9 10v11"/><path d="M15 10v11"/><path d="M19 10v11"/><path d="M12 2 4 10h16Z"/></svg>
            <span>Comptes</span>
        </a>
    </nav>

    <script>
        function openMenu() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').classList.add('active'); }
        function closeMenu() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }

        async function loadFullList() {
            try {
                const { data: { user } } = await window.supabase.auth.getUser();
                if (!user) {
                    window.location.replace('../login.html');
                    return;
                }

                const { data: karfas, error } = await window.supabase
                    .from('karfa')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const container = document.getElementById('karfa-full-list');
                const fmt = (v) => new Intl.NumberFormat('fr-FR').format(Math.round(v)) + " GNF";
                const dateFmt = (d) => new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });

                if (!karfas || karfas.length === 0) {
                    container.innerHTML = '<div class="loading-state">Aucun Karfa enregistré.</div>';
                    return;
                }

                let html = '';
                karfas.forEach(k => {
                    html += `
                    <div class="karfa-card" onclick="window.location.href='detail.html?id=${k.id}'">
                        <div class="karfa-left">
                            <div class="user-avatar">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </div>
                            <div class="karfa-info">
                                <div class="karfa-name">${k.beneficiaire}</div>
                                <div class="karfa-meta">${k.motif || 'Sans motif'} • ${dateFmt(k.created_at)}</div>
                            </div>
                        </div>
                        <div class="karfa-right">
                            <div class="karfa-amount">${fmt(k.montant)}</div>
                            <div style="display:flex; gap:10px; align-items:center;">
                                <span class="status-badge status-actif">ACTIF</span>
                                <div style="background:#f1f5f9; padding:5px; border-radius:6px; color:#64748b;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                });
                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                document.getElementById('karfa-full-list').innerHTML = '<div class="loading-state" style="color:#ef4444">Erreur de chargement.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadFullList);
    </script>
</body>
</html>
