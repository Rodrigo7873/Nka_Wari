<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Bienvenue | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --text-white: #ffffff;
            --text-muted: #d1d5db;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            height: 100vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 12vh;
            overflow: hidden;
            position: relative;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url("images/welcome-bg.jpg");
            background-size: cover;
            background-position: center;
            background-color: #1e2b3c;
        }
        .welcome-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 32px;
            padding: 50px 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            position: relative;
            z-index: 10;
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .hero-icon {
            width: 110px; height: 110px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 30px;
            background: white;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.2);
            animation: bounce 3s infinite ease-in-out;
        }
        .hero-icon img { width: 100%; height: 100%; object-fit: contain; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        h1 { color: var(--text-white); font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        p { color: var(--text-muted); font-size: 16px; margin-bottom: 40px; }
        .btn-start {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            transition: 0.3s;
            box-shadow: 0 10px 15px rgba(16, 185, 129, 0.4);
        }
        .btn-start:hover { transform: translateY(-4px); background: var(--primary-dark); }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="hero-icon">
            <img src="images/logo.jpg" alt="Logo N'Ka Wari">
        </div>
        <h1>Bienvenue dans N'Ka Wari</h1>
        <p>Gérez votre business d'orpaillage en toute sécurité</p>
        <a href="login.html" class="btn-start">Commencer</a>
    </div>
    <script src="js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
