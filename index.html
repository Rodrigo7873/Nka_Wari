<!DOCTYPE html>
<html lang="fr" class="theme-clair clair">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Bienvenue | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
        }

        /* Fond d'image avec overlay sombre comme sur la capture */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)),
            url("images/welcome-bg.jpg");
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .main-container {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
        }

        /* Carte Glassmorphism identique à l'image */
        .welcome-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 50px 25px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: cardFadeIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            margin: auto;
        }

        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo-circle {
            width: 120px; height: 120px; border-radius: 50%;
            background: white;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 35px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            border: 3px solid #fff;
        }

        .logo-circle img { width: 100%; height: 100%; object-fit: contain; }

        h1 { color: #ffffff; font-size: 34px; font-weight: 900; margin-bottom: 12px; letter-spacing: -1px; line-height: 1.1; }
        
        .subtitle { color: rgba(255, 255, 255, 0.85); font-size: 17px; line-height: 1.5; margin-bottom: 45px; max-width: 300px; margin-left: auto; margin-right: auto; }

        .btn-commencer {
            display: inline-block;
            background: #10b981;
            color: #fff;
            padding: 20px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 20px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-commencer:hover { transform: translateY(-3px); background: #059669; box-shadow: 0 15px 30px rgba(16, 185, 129, 0.4); }

        .footer {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="main-container">
        <div class="welcome-card">
            <div class="logo-circle">
                <img src="images/logo.jpg" alt="N'Ka Wari">
            </div>
            <h1>Bienvenue dans N'Ka Wari</h1>
            <p class="subtitle">Gérez votre business d'orpaillage en toute sécurité</p>
            <a href="login.html" class="btn-commencer">Commencer</a>
        </div>
        
        <div class="footer">N'KA WARI &copy; 2026</div>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialisation discrète pour redirection si déjà loggué
            if (window.supabase) {
                const { data: { session } } = await window.supabase.auth.getSession();
                if (session) window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
