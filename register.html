<!DOCTYPE html>
<html lang="fr" class="theme-clair clair">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Inscription | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/core.css">
    <!-- Load SDK then supabase.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.signUpWithSupabase !== 'function') {
                console.error("Critical: window.signUpWithSupabase is not defined!");
                alert("Erreur critique : le module d'authentification n'est pas chargé correctement.");
            } else {
                console.log("Check: signUpWithSupabase exists.");
            }
        });
    </script>
    <style>
        .register-step { display: none; animation: fadeIn 0.4s ease; }
        .register-step.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform: translateX(10px); } to { opacity:1; transform: translateX(0); } }
        .wizard-progress { display: flex; gap: 8px; margin-bottom: 30px; justify-content: center; }
        .progress-dot { width: 10px; height: 10px; border-radius: 50%; background: #e2e8f0; transition: 0.3s; }
        .progress-dot.active { background: #10b981; transform: scale(1.3); }
    </style>
</head>
<body class="theme-clair clair">
    <div class="app-container">
        <div class="login-wrapper">
            <div class="login-card" style="max-width: 480px; width: 95%;">
                <div class="login-header" style="text-align: center; margin-bottom: 30px;">
                    <img src="images/logo.jpg" alt="Logo" style="width: 70px; border-radius: 50%; margin-bottom: 10px;">
                    <h1 style="font-size: 24px; font-weight: 850;">Créer un compte</h1>
                    <p style="color: #64748b; font-size: 14px;">Rejoignez la révolution de la gestion d'or</p>
                </div>

                <div class="wizard-progress">
                    <div class="progress-dot active" id="dot1"></div>
                    <div class="progress-dot" id="dot2"></div>
                    <div class="progress-dot" id="dot3"></div>
                </div>

                <form id="registerWizard">
                    <!-- Étape 1 : Identité -->
                    <div class="register-step active" id="step1">
                        <div class="form-group">
                            <label>Prénom</label>
                            <input type="text" id="first_name" required placeholder="Votre prénom" style="width: 100%; height: 52px;">
                        </div>
                        <div class="form-group" style="margin-top: 15px;">
                            <label>Nom</label>
                            <input type="text" id="last_name" required placeholder="Votre nom de famille" style="width: 100%; height: 52px;">
                        </div>
                        <button type="button" onclick="nextStep(2)" style="width: 100%; margin-top: 25px; height: 52px; background: #10b981; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">Continuer</button>
                    </div>

                    <!-- Étape 2 : Sécurité -->
                    <div class="register-step" id="step2">
                        <div class="form-group">
                            <label>Email (Optionnel)</label>
                            <input type="email" id="email" placeholder="votre@email.com" style="width: 100%; height: 52px;">
                        </div>
                        <div class="form-group" style="margin-top: 15px;">
                            <label>Question Secrète</label>
                            <select id="secret_question" style="width: 100%; height: 52px;">
                                <option value="equipe">Votre équipe préférée ?</option>
                                <option value="ecole">Le nom de votre première école ?</option>
                                <option value="animal">Le nom de votre premier animal ?</option>
                                <option value="ville">Votre ville de naissance ?</option>
                                <option value="mere">Le nom de jeune fille de votre mère ?</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-top: 15px;">
                            <label>Réponse Secrète</label>
                            <input type="text" id="secret_answer" required placeholder="Votre réponse" style="width: 100%; height: 52px;">
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 25px;">
                            <button type="button" onclick="nextStep(1)" style="flex: 1; height: 52px;">Retour</button>
                            <button type="button" onclick="nextStep(3)" style="flex: 2; height: 52px;">Continuer</button>
                        </div>
                    </div>

                    <!-- Étape 3 : Mot de passe -->
                    <div class="register-step" id="step3">
                        <div class="form-group">
                            <label>Numéro de téléphone</label>
                            <input type="tel" id="phone" required placeholder="610 00 00 00" style="width: 100%; height: 52px;">
                        </div>
                        <div class="form-group" style="margin-top: 15px;">
                            <label>Mot de passe</label>
                            <input type="password" id="password" required placeholder="Min. 8 caractères" style="width: 100%; height: 52px;">
                        </div>
                        <div class="form-group" style="margin-top: 15px;">
                            <label>Confirmation</label>
                            <input type="password" id="passwordConfirm" required placeholder="Répétez le mot de passe" style="width: 100%; height: 52px;">
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 25px;">
                            <button type="button" onclick="nextStep(2)" style="flex: 1; height: 52px;">Retour</button>
                            <button type="submit" id="finishBtn" style="flex: 2; height: 52px; background: #10b981; color: white;">Créer mon compte</button>
                        </div>
                    </div>
                </form>

                <div style="margin-top: 25px; text-align: center;">
                    Pas de compte ? <a href="login.html" style="color: #10b981; font-weight: 700;">Se connecter</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        function nextStep(step) {
            document.querySelectorAll('.register-step').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.progress-dot').forEach(d => d.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            for(let i=1; i<=step; i++) document.getElementById('dot'+i).classList.add('active');
        }

        document.getElementById('registerWizard').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('passwordConfirm').value;
            if(pass !== confirm) { alert("Les mots de passe ne correspondent pas."); return; }

            const btn = document.getElementById('finishBtn');
            btn.disabled = true; btn.textContent = "Création...";

            const userData = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                email: document.getElementById('email').value || (document.getElementById('phone').value.replace(/\s/g, '') + "@nkawari.local"),
                password: pass,
                phone: document.getElementById('phone').value,
                secret_question: document.getElementById('secret_question').value,
                secret_answer: document.getElementById('secret_answer').value
            };

            try {
                if (typeof window.signUpWithSupabase !== 'function') throw new Error("Fonction d'inscription non disponible");
                await window.signUpWithSupabase(userData);
                alert("Compte créé avec succès ! Connectez-vous.");
                window.location.href = 'login.html';
            } catch(err) {
                alert("Erreur : " + err.message);
                btn.disabled = false; btn.textContent = "Créer mon compte";
            }
        });
    </script>
</body>
</html>
