<!DOCTYPE html>
<html lang="fr" class="theme-clair clair">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Bienvenue | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/core.css">
    <style>
        :root {
            --brand-green: #27ae60;
            --page-bg: radial-gradient(circle at top right, #eefcf3, #f8fafc);
            --text-main: #1e2b3c;
            --text-sub: #64748b;
            --border-soft: #e2e8f0;
        }

        body, html {
            height: 100%;
            margin: 0;
            background: var(--page-bg);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .wizard-wrapper {
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.4s ease-out;
        }

        .wizard-card {
            background: #ffffff;
            width: 100%;
            padding: 45px 40px;
            box-sizing: border-box;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 1);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (min-width: 768px) {
            .logo-img { width: 100px !important; height: 100px !important; margin-bottom: 25px !important; }
            .wizard-card { padding: 55px 50px; }
        }

        @media (max-width: 767px) {
            .app-container { padding: 0; align-items: flex-start; }
            .wizard-card { border-radius: 0; border: none; box-shadow: none; padding: 40px 24px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
            .wizard-wrapper { max-width: 100%; }
            .logo-img { width: 85px; height: 85px; }
        }

        .register-step { display: none; }
        .register-step.active { display: block; animation: fadeIn 0.3s ease-out; }
        
        .wizard-progress { display: flex; gap: 10px; margin: 30px 0; justify-content: center; }
        .progress-dot { width: 10px; height: 10px; border-radius: 50%; background: #e2e8f0; transition: all 0.3s ease; }
        .progress-dot.active { background: var(--brand-green); transform: scale(1.3); }
        .progress-dot.completed { background: var(--brand-green); }
        
        .form-group label { display: block; font-weight: 700; color: var(--text-main); margin-bottom: 12px; font-size: 14.5px; text-align: left; padding-left: 5px; }
        
        .input-wrapper { display: flex; align-items: center; background: #f9fafb; border: 1.5px solid var(--border-soft); border-radius: 16px; height: 58px; transition: all 0.2s ease; box-sizing: border-box; overflow: hidden; }
        .input-wrapper:focus-within { border-color: var(--brand-green); background: #fff; box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.08); }
        .input-clean { flex: 1; border: none; outline: none; padding: 0 18px; font-size: 16px; background: transparent; color: var(--text-main); font-weight: 500; height: 100%; }
        .input-clean::placeholder { color: rgba(255, 255, 255, 0.4); }
        .input-clean option { background: #1e2b3c; color: #fff; }
        
        .btn-primary { width: 100%; height: 58px; background: var(--brand-green); color: white; border: none; border-radius: 16px; font-weight: 700; font-size: 17px; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 15px -3px rgba(39, 174, 96, 0.2); margin-top: 25px; }
        .btn-secondary { height: 58px; background: #fff; color: var(--text-sub); border: 2px solid #f1f5f9; border-radius: 16px; font-weight: 600; font-size: 15px; cursor: pointer; }
        
        .id-card { background: #1e2b3c; border-radius: 24px; padding: 35px; margin: 25px 0; text-align: center; box-shadow: 0 20px 40px rgba(30, 43, 60, 0.2); }
        .id-value { font-size: 38px; font-weight: 800; color: #fff; letter-spacing: 4px; font-family: 'Monaco', monospace; margin: 15px 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="wizard-wrapper">
            <div class="wizard-card">
                <div id="registrationHeader" style="text-align: center;">
                    <img src="images/logo.jpg" alt="Logo" class="logo-img" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 10px 15px -3px rgba(0, 0, 0, 0.1); object-fit: contain; background: #fff; margin-bottom: 20px;">
                    <div id="globalTitle">
                        <h1 style="font-size: 28px; font-weight: 900; color: var(--text-main); margin: 0; letter-spacing: -0.5px;">Inscription</h1>
                        <p style="color: var(--text-sub); font-size: 15px; margin-top: 5px;">Créez votre profil de gestion</p>
                    </div>
                    
                    <div class="wizard-progress">
                        <div class="progress-dot active" id="dot1"></div>
                        <div class="progress-dot" id="dot2"></div>
                        <div class="progress-dot" id="dot3"></div>
                    </div>
                </div>

                <form id="registerWizard">
                    <!-- Étape 1 : Bienvenue -->
                    <div class="register-step active" id="step1">
                        <div style="text-align: center; margin-bottom: 30px;">
                            <h2 style="font-weight: 850; color: var(--text-main); margin: 0; font-size: 30px; letter-spacing: -1px;">Bienvenue !</h2>
                            <p style="color: var(--text-sub); font-size: 16px; margin-top: 8px;">Commençons par faire connaissance</p>
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;"><label>Prénom</label><div class="input-wrapper"><input type="text" id="first_name" required placeholder="Ex: Moussa" class="input-clean"></div></div>
                        <div class="form-group"><label>Nom</label><div class="input-wrapper"><input type="text" id="last_name" required placeholder="Ex: Camara" class="input-clean"></div></div>
                        <button type="button" onclick="goToNextStep(2)" class="btn-primary">Suivant</button>
                    </div>

                    <!-- Étape 2 : Sécurité -->
                    <div class="register-step" id="step2">
                        <div class="form-group" style="margin-bottom: 20px;"><label>Question Secrète</label><div class="input-wrapper"><select id="secret_question" class="input-clean" style="width: 100%;"><option value="equipe">Votre équipe préférée ?</option><option value="ecole">Le nom de votre première école ?</option><option value="animal">Le nom de votre premier animal ?</option><option value="ville">Votre ville de naissance ?</option><option value="mere">Le nom de jeune fille de votre mère ?</option></select></div></div>
                        <div class="form-group"><label>Réponse Secrète</label><div class="input-wrapper"><input type="text" id="secret_answer" required placeholder="Votre réponse" class="input-clean"></div></div>
                        <div style="display: flex; gap: 10px; margin-top: 25px;"><button type="button" onclick="nextStep(1)" class="btn-secondary" style="flex: 1;">Retour</button><button type="button" onclick="goToNextStep(3)" class="btn-primary" style="flex: 2; margin-top: 0;">Suivant</button></div>
                    </div>

                    <!-- Étape 3 : Finalisation -->
                    <div class="register-step" id="step3">
                        <div class="form-group" style="margin-bottom: 20px;"><label>Numéro de téléphone</label><div class="input-wrapper"><div style="display: flex; align-items: center; gap: 8px; padding: 0 16px; background: #f9fafb; border-right: 1.5px solid var(--border-soft); height: 100%;"><svg width="20" height="14" viewBox="0 0 3 2"><rect width="1" height="2" fill="#ce1126"/><rect x="1" width="1" height="2" fill="#fcd116"/><rect x="2" width="1" height="2" fill="#009460"/></svg><span style="font-weight: 800; color: var(--text-main); font-size: 15px;">+224</span></div><input type="tel" id="getPhone" required placeholder="620 00 00 00" class="input-clean"></div></div>
                        <div class="form-group" style="margin-bottom: 20px;"><label>Mot de passe</label><div class="input-wrapper"><input type="password" id="password" required placeholder="Min. 8 caractères" class="input-clean"></div></div>
                        <div class="form-group"><label>Confirmer le mot de passe</label><div class="input-wrapper"><input type="password" id="confirm_password" required placeholder="Répétez le mot de passe" class="input-clean"></div></div>
                        <div style="display: flex; gap: 10px; margin-top: 30px;"><button type="button" onclick="nextStep(2)" class="btn-secondary" style="flex: 1;">Retour</button><button type="submit" id="finishBtn" class="btn-primary" style="flex: 2; margin-top: 0;">Créer mon compte</button></div>
                    </div>
                </form>

                <div class="register-step" id="step4"><div style="text-align: center;"><div style="width: 80px; height: 80px; background: #dcfce7; color: var(--brand-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 35px;">✓</div><h2 style="font-weight: 850; color: var(--text-main); margin: 0; font-size: 28px;">Bienvenue !</h2><div class="id-card"><p style="font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.7); margin: 0; text-transform: uppercase; letter-spacing: 1px;">Votre Identifiant Unique</p><div class="id-value" id="displayID">------</div></div><button onclick="window.location.href='login.html'" class="btn-primary" style="background: #1e2b3c; margin-top: 0;">Vers la connexion</button></div></div>

                <div id="loginLink" style="margin-top: 30px; text-align: center; font-size: 15px; color: var(--text-sub);">Déjà inscrit ? <a href="login.html" style="color: var(--brand-green); font-weight: 700; text-decoration: none; margin-left: 5px;">Se connecter</a></div>
            </div>
        </div>
    </div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.register-step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            document.getElementById('globalTitle').style.display = (step === 1) ? 'none' : 'block';
            document.querySelectorAll('.progress-dot').forEach((dot, idx) => {
                dot.classList.toggle('completed', (idx + 1) < step);
                dot.classList.toggle('active', (idx + 1) === step);
            });
        }
        function genererID(nom, prenom) {
            const n = nom.trim().replace(/\s/g, '').toUpperCase();
            const p = prenom.trim().replace(/\s/g, '').toUpperCase();
            return (n.length >= 2 ? n.slice(-2) : n) + (p.length >= 2 ? p.slice(0, 2) : p) + Math.floor(100000 + Math.random() * 900000);
        }
        function goToNextStep(step) {
            const container = document.getElementById('step' + (step - 1));
            const inputs = container.querySelectorAll('input[required]');
            let ok = true;
            inputs.forEach(i => { if (!i.value.trim()) { i.parentElement.style.borderColor = '#ef4444'; ok = false; } else { i.parentElement.style.borderColor = '#e2e8f0'; } });
            if (ok) nextStep(step); else window.showToast("Merci de remplir tous les champs.", "warning");
        }
        document.getElementById('getPhone').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '').substring(0, 9);
            let f = ""; if(v.length>0) f=v.substring(0,3); if(v.length>3) f+=" "+v.substring(3,5); if(v.length>5) f+=" "+v.substring(5,7); if(v.length>7) f+=" "+v.substring(7,9);
            e.target.value = f;
        });
        document.getElementById('registerWizard').addEventListener('submit', async (e) => {
            e.preventDefault();
            const p = document.getElementById('password').value;
            const cp = document.getElementById('confirm_password').value;
            if (p !== cp) return window.showToast("Les mots de passe ne correspondent pas.", "error");
            const btn = document.getElementById('finishBtn'); btn.disabled = true; btn.textContent = "Création...";
            const prenom = document.getElementById('first_name').value;
            const nom = document.getElementById('last_name').value;
            const phone = document.getElementById('getPhone').value.replace(/\s/g, '');
            const gid = genererID(nom, prenom);
            const email = gid + "@nkawari.local";
            try {
                const { data, error } = await window.supabase.auth.signUp({ email, password: p, options: { data: { full_name: prenom + " " + nom } } });
                if (error) throw error;
                if (data.user) { await window.supabase.from('profiles').insert({ id: data.user.id, identifiant: gid, phone: '+224' + phone, email, full_name: prenom + " " + nom }); }
                document.getElementById('displayID').textContent = gid;
                document.getElementById('registrationHeader').style.display = 'none';
                document.getElementById('registerWizard').style.display = 'none';
                document.getElementById('loginLink').style.display = 'none';
                nextStep(4); window.showToast("Compte créé !", "success");
            } catch(err) { window.showToast(err.message, "error"); btn.disabled = false; btn.textContent = "Créer mon compte"; }
        });
        // Initial state
        document.getElementById('globalTitle').style.display = 'none';
    </script>
</body>
</html>
