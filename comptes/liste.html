<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>N'Ka Wari | Toutes les opérations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --primary-blue: #3b82f6; 
            --text-dark: #1e293b;
            --text-gray: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-body); color: var(--text-dark); padding-bottom: 90px; }

        .max-w { max-width: 500px; margin: 0 auto; }

        /* HEADER */
        .header-top { display: flex; justify-content: space-between; padding: 16px 20px; align-items: center; margin-bottom: 8px; }
        .icon-btn { background: transparent; border: none; padding: 8px; color: #334155; cursor: pointer; display: flex; align-items: center; }

        /* TITLE */
        .page-title-box { text-align: center; margin-bottom: 24px; padding: 0 20px; }
        .page-title { font-size: 28px; font-weight: 800; color: #1e293b; letter-spacing: -1px; }

        /* BACK BUTTON */
        .back-nav { display: flex; justify-content: center; margin-bottom: 30px; }
        .btn-retour { background: #fff; border: 1px solid #e2e8f0; border-radius: 25px; padding: 10px 24px; font-size: 14px; font-weight: 600; color: #64748b; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }

        /* DATE GROUP */
        .date-separator { margin: 0 20px 20px 20px; display: flex; align-items: center; gap: 10px; color: #1e293b; font-weight: 700; font-size: 17px; }
        .date-line { flex: 1; height: 1px; background: #e2e8f0; margin-left: 10px; }

        /* OP CARD */
        .op-card { background: #fff; border-radius: 20px; margin: 0 16px 12px 16px; padding: 20px; border: 1px solid #f1f5f9; position: relative; }
        .op-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        
        .op-card-info { display: flex; flex-direction: column; gap: 4px; }
        .op-card-date { font-size: 13px; color: #94a3b8; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .op-card-date span { width: 4px; height: 4px; background: #cbd5e1; border-radius: 50%; }

        /* BADGES */
        .badge { font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 8px; display: inline-block; margin-bottom: 6px; }
        .badge-green { background: #dcfce7; color: #15803d; }
        .badge-red { background: #fee2e2; color: #b91c1c; }

        .op-card-amount { font-size: 18px; font-weight: 800; margin-top: 4px; }
        .text-green { color: #10b981; }
        .text-red { color: #ef4444; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; align-items: center; height: 75px; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #94a3b8; gap: 6px; font-size: 10px; font-weight: 700; transition: 0.2s; }
        .nav-item.active { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="max-w">
        <!-- HEADER TOP -->
        <div class="header-top">
            <button class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <button class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </button>
        </div>

        <!-- PAGE TITLE -->
        <div class="page-title-box">
            <h1 class="page-title">Toutes les opérations</h1>
        </div>

        <!-- BACK BUTTON -->
        <div class="back-nav">
            <a href="list.html" class="btn-retour">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Retour
            </a>
        </div>

        <!-- DATE GROUP: 21 MARS 2026 -->
        <div class="date-separator">

            21 mars 2026

        <!-- OP CARD 1 -->

            </div>
            <div class="op-card-info">
                <div class="op-card-date"><span></span> Le 21/03/2026 à 15:07</div>
                <div class="op-card-amount text-green">+ 2 500 000 GNF</div>
            </div>
        </div>

        <!-- OP CARD 2 -->
        <div class="op-card">
            <div style="text-align: right;">
                <div class="badge badge-red">Retrait/Restitution</div>
            </div>
            <div class="op-card-info">
                <div class="op-card-date"><span></span> Le 21/03/2026 à 15:06</div>
                <div class="op-card-amount text-red">- 500 000 GNF</div>
            </div>
        </div>

        <!-- OP CARD 3 -->
        <div class="op-card">
            <div style="text-align: right;">
                <div class="badge badge-green">Ajout de fonds</div>
            </div>
            <div class="op-card-info">
                <div class="op-card-date"><span></span> Le 21/03/2026 à 15:06</div>
                <div class="op-card-amount text-green">+ 200 000 GNF</div>
            </div>
        </div>

        <!-- OP CARD 4 -->
        <div class="op-card">
            <div style="text-align: right;">
                <div class="badge badge-red">Retrait/Restitution</div>
            </div>
            <div class="op-card-info">
                <div class="op-card-date"><span></span> Le 21/03/2026 à 15:05</div>
                <div class="op-card-amount text-red">- 5 000 000 GNF</div>
            </div>
        </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="../dashboard.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Accueil</span>
        </a>
        <a href="../karfa/list.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
            <span>Karfa</span>
        </a>
        <a href="../dettes/list.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>Dettes</span>
        </a>
        <a href="list.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M3 10h18"/><path d="M5 10v11"/><path d="M9 10v11"/><path d="M15 10v11"/><path d="M19 10v11"/><path d="M12 2 4 10h16Z"/></svg>

    </nav>
</body>
</html>
