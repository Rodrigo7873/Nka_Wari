<!DOCTYPE html>
<html lang="fr" class="theme-clair clair">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Connexion | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/core.css">
    <style>
        :root {
            --brand-green: #10b981;
            --page-bg: #f9fafb;
            --text-main: #1e2b3c;
            --text-sub: #4b5563;
            --border-soft: #e2e8f0;
        }

        body, html {
            height: 100%;
            margin: 0;
            background: var(--page-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            animation: fadeIn 0.5s ease-out;
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            padding: 45px 40px;
            box-sizing: border-box;
            border-radius: 28px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-soft);
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Desktop specific logo size */
        @media (min-width: 768px) {
            .logo-img { width: 100px !important; height: 100px !important; margin-bottom: 20px !important; }
            .login-card { box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05); }
        }

        @media (max-width: 767px) {
            .app-container { padding: 0; align-items: flex-start; background: #ffffff; }
            .login-card { border-radius: 0; border: none; box-shadow: none; padding: 30px 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
            .login-wrapper { max-width: 100%; }
            .logo-img { width: 85px; height: 85px; }
        }

        .form-group label { display: block; font-weight: 700; color: var(--text-main); margin-bottom: 12px; font-size: 14px; }
        
        .input-wrapper { display: flex; align-items: center; background: #fff; border: 1.5px solid var(--border-soft); border-radius: 16px; height: 58px; overflow: hidden; transition: all 0.2s ease; box-sizing: border-box; }
        .input-wrapper:focus-within { border-color: var(--brand-green); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08); }
        
        .input-clean { flex: 1; border: none; outline: none; padding: 0 18px; font-size: 16px; background: transparent; color: var(--text-main); font-weight: 500; height: 100%; }
        
        .btn-primary { width: 100%; height: 58px; background: var(--brand-green); color: white; border: none; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); margin-top: 25px; }
        .btn-primary:active { transform: scale(0.99); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</head>
<body class="theme-clair clair">
    <div class="app-container">
        <div class="login-wrapper">
            <div class="login-card">
                <div class="login-header" style="text-align: center; margin-bottom: 35px;">
                    <!-- Logo Style Raffiné -->
                    <img src="images/logo.jpg" alt="Logo" class="logo-img" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 10px 15px -3px rgba(0, 0, 0, 0.1); object-fit: contain; background: #fff; margin-bottom: 20px; transition: all 0.3s ease;">
                    <h1 style="font-size: 30px; font-weight: 900; color: var(--text-main); margin: 0; letter-spacing: -1px;">N'Ka Wari</h1>
                    <p style="color: var(--text-sub); font-size: 15px; margin-top: 5px; font-weight: 500;">Votre espace de gestion sécurisé</p>
                </div>

                <form id="loginForm">
                    <div class="form-group" style="margin-bottom: 22px;">
                        <label id="input-label">Numéro de téléphone</label>
                        <div class="input-wrapper">
                            <div id="tel-prefix" style="display: flex; align-items: center; gap: 8px; padding: 0 16px; background: #f9fafb; border-right: 1.5px solid var(--border-soft); height: 100%;">
                                <svg width="20" height="14" viewBox="0 0 3 2"><rect width="1" height="2" fill="#ce1126"/><rect x="1" width="1" height="2" fill="#fcd116"/><rect x="2" width="1" height="2" fill="#009460"/></svg>
                                <span style="font-weight: 800; color: var(--text-main); font-size: 15px;">+224</span>
                            </div>
                            <span id="mode-icon-id" style="display: none; padding-left: 18px; color: #94a3b8;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
                            <input type="text" id="login_value" required placeholder="620 00 00 00" class="input-clean">
                            <button type="button" onclick="toggleLoginMode()" style="background: none; border: none; padding: 0 18px; cursor: pointer; color: #94a3b8;">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"></rect><line x1="7" y1="8" x2="17" y2="8"></line><line x1="7" y1="12" x2="17" y2="12"></line><line x1="7" y1="16" x2="13" y2="16"></line></svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 8px;">
                        <label>Mot de passe</label>
                        <div class="input-wrapper">
                            <span style="padding-left: 18px; color: #94a3b8;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                            <input type="password" id="password" required placeholder="••••••••" class="input-clean">
                            <button type="button" onclick="togglePassword()" style="background: none; border: none; padding: 0 18px; cursor: pointer; color: #94a3b8;">
                                <svg id="eye-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div style="text-align: right; margin-bottom: 30px;"><a href="#" style="color: var(--text-sub); font-size: 14px; text-decoration: none; font-weight: 500;">Mot de passe oublié ?</a></div>

                    <button type="submit" id="loginBtn" class="btn-primary">Se connecter</button>
                </form>

                <div style="margin-top: 35px; text-align: center;">
                    <p style="color: var(--text-sub); font-size: 15px; margin: 0;">Pas de compte ? <a href="register.html" style="color: var(--brand-green); font-weight: 700; text-decoration: none; margin-left: 5px;">S'inscrire gratuitement</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'tel';
        const valInput = document.getElementById('login_value');

        function toggleLoginMode() {
            const label = document.getElementById('input-label');
            const prefix = document.getElementById('tel-prefix');
            const iconId = document.getElementById('mode-icon-id');
            valInput.value = "";
            if (currentMode === 'tel') {
                currentMode = 'id';
                label.innerText = "Identifiant";
                prefix.style.display = 'none';
                iconId.style.display = 'flex';
                valInput.placeholder = "Ex: RASI186857";
            } else {
                currentMode = 'tel';
                label.innerText = "Numéro de téléphone";
                prefix.style.display = 'flex';
                iconId.style.display = 'none';
                valInput.placeholder = "620 00 00 00";
            }
        }

        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                passInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        valInput.addEventListener('input', (e) => {
            if (currentMode === 'tel') {
                let val = e.target.value.replace(/\D/g, '').substring(0, 9);
                let f = "";
                if (val.length > 0) f = val.substring(0,3);
                if (val.length > 3) f += " " + val.substring(3,5);
                if (val.length > 5) f += " " + val.substring(5,7);
                if (val.length > 7) f += " " + val.substring(7,9);
                e.target.value = f;
            } else { e.target.value = e.target.value.toUpperCase(); }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            let val = valInput.value;
            let identifier = val;
            if (currentMode === 'tel') {
                const phoneDigits = val.replace(/\D/g, '');
                if (phoneDigits.length !== 9) {
                    window.showToast("Le numéro doit comporter 9 chiffres.", "error");
                    return;
                }
                identifier = "+224" + phoneDigits;
            }
            btn.disabled = true; btn.textContent = 'Connexion...';
            try {
                const email = await findEmailFromIdentifier(identifier);
                if (!email) {
                    window.showToast("L'identifiant ou le numéro saisi ne correspond à aucun compte.", "error");
                    btn.disabled = false; btn.textContent = "Se connecter";
                    return;
                }
                await window.signInWithSupabase(email, document.getElementById('password').value);
                window.showToast("Connexion réussie !", "success");
            } catch (err) {
                console.error("Login trace:", err);
                let msg = err.message || "Une erreur est survenue lors de la connexion.";
                const low = msg.toLowerCase();
                
                // Si c'est une erreur identifiants ou syntaxe, on donne le message pro
                if (low.includes("invalid") || low.includes("credential") || low.includes("syntax") || low.includes("not found")) {
                    msg = "Identifiant ou mot de passe incorrect. Veuillez réessayer.";
                } else if (low.includes("network") || low.includes("fetch")) {
                    msg = "Souci de connexion réseau. Vérifiez votre internet.";
                }
                
                window.showToast(msg, "error");
                btn.disabled = false; btn.textContent = "Se connecter";
            }
        });
    </script>
</body>
</html>
