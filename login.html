<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Connexion | N'Ka Wari</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/core.css">
    <meta name="theme-color" content="#1e2b3c">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="theme-clair clair">

    <div class="app-container">
        <div class="login-wrapper">
            <div class="login-card">
                <div class="login-header" style="display: flex; flex-direction: column; align-items: center;">
                    <img src="images/logo.jpg" alt="Logo N'Ka Wari" 
                         style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 12px; box-shadow: 0 6px 16px rgba(0,0,0,0.1); border: 2px solid white; object-fit: contain; background: white;"
                         onerror="this.src=''; this.style.backgroundColor='#10b981';">
                    <h1 class="brand-name" style="margin-bottom: 5px;">N'Ka Wari</h1>
                    <p class="brand-subtitle">Connectez-vous à votre espace de gestion</p>
                </div>

                <div class="alert-container" id="alertContainer" style="display: none;">
                    <div class="alert alert-error" id="errorMessage"></div>
                </div>

                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label>Email de connexion</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            </span>
                            <input type="email" id="email" required placeholder="votre@email.com" style="padding-left: 48px;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mot de passe</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </span>
                            <input type="password" id="password" required placeholder="••••••••" style="padding-left: 48px;">
                            <button type="button" class="eye-btn" onclick="togglePassword()">
                                <span id="eye-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </span>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login-premium" id="loginBtn">
                        Se connecter
                    </button>
                </form>

                <div class="login-footer">
                    <p>Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
                    <div class="copyright">&copy; 2026 N'Ka Wari - Système de Gestion</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
            } else {
                passInput.type = 'password';
                eyeIcon.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alertContainer');
            const errorMessage = document.getElementById('errorMessage');
            const btn = document.getElementById('loginBtn');
            
            btn.disabled = true;
            btn.textContent = 'Connexion...';
            alertContainer.style.display = 'none';

            try {
                await signInWithSupabase(email, password);
                // Si la connexion réussit, la redirection est gérée dans supabase.js
            } catch (error) {
                errorMessage.textContent = error.message;
                alertContainer.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
