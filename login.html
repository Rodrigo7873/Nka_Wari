<!DOCTYPE html>
<html lang="fr" class="theme-clair clair">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Connexion | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/core.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .login-card { animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    </style>
</head>
<body class="theme-clair clair">
    <div class="app-container">
        <div class="login-wrapper">
            <div class="login-card">
                <div class="login-header" style="display: flex; flex-direction: column; align-items: center; margin-bottom: 30px;">
                    <img src="images/logo.jpg" alt="Logo N'Ka Wari" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 12px; box-shadow: 0 6px 16px rgba(0,0,0,0.1); border: 2px solid white; object-fit: contain; background: white;">
                    <h1 class="brand-name" style="font-size: 24px; font-weight: 800; color: #1e293b;">N'Ka Wari</h1>
                    <p class="brand-subtitle" style="color: #64748b; font-size: 14px;">Connectez-vous à votre espace de gestion</p>
                </div>

                <div class="alert-container" id="alertContainer" style="display: none; margin-bottom: 20px;">
                    <div class="alert alert-error" id="errorMessage" style="background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 12px; font-size: 14px; border: 1px solid #fecaca;"></div>
                </div>

                <form class="login-form" id="loginForm">
                    <input type="hidden" id="login_mode" value="tel">
                    
                    <div class="form-group">
                        <label id="input-label" style="display: block; font-weight: 600; margin-bottom: 8px; color: #334155; font-size: 14px;">Numéro de téléphone</label>
                        <div class="input-wrapper" id="smart-input-wrapper" style="display: flex; align-items: center; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 14px; height: 56px; overflow: hidden; transition: 0.3s;">
                            <!-- Prefix Tel -->
                            <div class="tel-prefix-inline" id="tel-prefix" style="display: flex; align-items: center; gap: 8px; padding-left: 16px; background: #f8fafc; border-right: 1px solid #e2e8f0; height: 100%;">
                                <svg width="20" height="14" viewBox="0 0 3 2"><rect width="1" height="2" fill="#ce1126"/><rect x="1" width="1" height="2" fill="#fcd116"/><rect x="2" width="1" height="2" fill="#009460"/></svg>
                                <span style="font-weight: 700; color: #475569; font-size: 15px;">+224</span>
                            </div>
                            
                            <!-- Email Icon (Hidden by default) -->
                            <span id="mode-icon-main" style="display: none; padding-left: 16px; color: #94a3b8;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            </span>

                            <input type="text" id="login_value" required placeholder="610 00 00 00" style="flex: 1; border: none; outline: none; padding: 0 16px; font-size: 16px; font-weight: 500;">
                            
                            <button type="button" onclick="toggleLoginMode()" style="background: none; border: none; padding: 0 16px; cursor: pointer; color: #64748b;">
                                <span id="toggle-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="13" y2="16"/></svg>
                                </span>
                            </button>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <label style="display: block; font-weight: 600; margin-bottom: 8px; color: #334155; font-size: 14px;">Mot de passe</label>
                        <div class="input-wrapper" style="display: flex; align-items: center; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 14px; height: 56px; position: relative;">
                            <span style="padding-left: 16px; color: #94a3b8;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </span>
                            <input type="password" id="password" required placeholder="••••••••" style="flex: 1; border: none; outline: none; padding: 0 16px; font-size: 16px;">
                            <button type="button" onclick="togglePassword()" style="background: none; border: none; padding: 0 16px; cursor: pointer; color: #64748b;">
                                <span id="eye-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
                            </button>
                        </div>
                        <div style="text-align: right; margin-top: 8px;">
                            <a href="forgot-password.html" style="font-size: 13px; color: #10b981; font-weight: 600; text-decoration: none;">Mot de passe oublié ?</a>
                        </div>
                    </div>

                    <button type="submit" id="loginBtn" style="width: 100%; margin-top: 30px; height: 56px; background: #10b981; color: white; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); transition: 0.3s;">
                        Se connecter
                    </button>
                </form>

                <div class="login-footer" style="margin-top: 30px; text-align: center; color: #64748b; font-size: 14px;">
                    <p>Pas encore de compte ? <a href="register.html" style="color: #10b981; font-weight: 700; text-decoration: none;">S'inscrire</a></p>
                    <div style="margin-top: 20px; opacity: 0.6; font-size: 12px;">&copy; 2026 N'Ka Wari - Système de Gestion</div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/supabase.js"></script>
    <script>
        let currentMode = 'tel';
        const valInput = document.getElementById('login_value');
        const wrapper = document.getElementById('smart-input-wrapper');

        valInput.addEventListener('input', (e) => {
            if (currentMode === 'tel') {
                let val = e.target.value.replace(/\D/g, '').substring(0, 9);
                let f = "";
                if (val.length > 0) f = val.substring(0,3);
                if (val.length > 3) f += " " + val.substring(3,5);
                if (val.length > 5) f += " " + val.substring(5,7);
                if (val.length > 7) f += " " + val.substring(7,9);
                e.target.value = f;
            }
        });

        function toggleLoginMode() {
            const label = document.getElementById('input-label');
            const prefix = document.getElementById('tel-prefix');
            const iconMain = document.getElementById('mode-icon-main');
            const toggleIcon = document.getElementById('toggle-icon');
            valInput.value = "";

            if (currentMode === 'tel') {
                currentMode = 'email';
                label.innerText = "Email ou Identifiant Unique";
                valInput.placeholder = "votre@email.com";
                prefix.style.display = 'none';
                iconMain.style.display = 'flex';
                toggleIcon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.19-2.19a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
            } else {
                currentMode = 'tel';
                label.innerText = "Numéro de téléphone";
                valInput.placeholder = "610 00 00 00";
                prefix.style.display = 'flex';
                iconMain.style.display = 'none';
                toggleIcon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="13" y2="16"/></svg>`;
            }
            wrapper.style.borderColor = "#10b981";
            setTimeout(() => wrapper.style.borderColor = "#e2e8f0", 500);
        }

        function togglePassword() {
            const p = document.getElementById('password');
            const eye = document.getElementById('eye-icon');
            if (p.type === 'password') {
                p.type = 'text';
                eye.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
            } else {
                p.type = 'password';
                eye.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const val = valInput.value;
            const pass = document.getElementById('password').value;
            btn.disabled = true; btn.textContent = 'Connexion...';
            try {
                await signInWithSupabase(val, pass, currentMode === 'tel' ? 'tel' : 'email');
            } catch (err) {
                document.getElementById('errorMessage').textContent = "Erreur : " + err.message;
                document.getElementById('alertContainer').style.display = 'block';
                btn.disabled = false; btn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
