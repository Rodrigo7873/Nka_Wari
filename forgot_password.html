<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Récupération - N'Ka Wari</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --brand-green: #009460;
            --brand-yellow: #fcd116;
            --brand-red: #ce1126;
            --text-main: #1e2b3c;
            --text-sub: #64748b;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --border-soft: rgba(226, 232, 240, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .recovery-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid #fff;
            margin: 20px;
        }

        .step-container { display: none; }
        .step-container.active { display: block; animation: slideIn 0.4s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-weight: 850; color: var(--text-main); margin: 0 0 10px; font-size: 24px; text-align: center; }
        p { color: var(--text-sub); text-align: center; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; margin-left: 4px; }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border: 1.5px solid transparent;
            border-radius: 16px;
            height: 56px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-wrapper:focus-within {
            background: #fff;
            border-color: var(--brand-green);
            box-shadow: 0 0 0 4px rgba(0, 148, 96, 0.1);
        }

        .input-clean {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0 18px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            outline: none;
        }

        .btn-primary {
            width: 100%;
            height: 56px;
            background: var(--text-main);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            z-index: 1000;
            display: none;
        }

        .question-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed var(--brand-green);
            margin-bottom: 20px;
            font-style: italic;
            color: var(--text-main);
            font-weight: 600;
            text-align: center;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>
<body>
    <div id="toast" class="toast"></div>

    <div class="recovery-card">
        <!-- Étape 1 : Identifiant -->
        <div id="step1" class="step-container active">
            <h2>Récupération</h2>
            <p>Saisissez votre identifiant pour retrouver votre question secrète.</p>
            <div class="form-group">
                <label>Identifiant ou Téléphone</label>
                <div class="input-wrapper">
                    <input type="text" id="target_id" placeholder="Ex: RASI123456 ou 6XX..." class="input-clean">
                </div>
            </div>
            <button onclick="fetchQuestion()" id="btnStep1" class="btn-primary">Vérifier</button>
            <div style="margin-top: 20px; text-align: center;">
                <a href="login.html" style="color: var(--text-sub); text-decoration: none; font-size: 14px; font-weight: 600;">Retour à la connexion</a>
            </div>
        </div>

        <!-- Étape 2 : Question Secrète -->
        <div id="step2" class="step-container">
            <h2>Question Secrète</h2>
            <p>Répondez à votre question pour changer votre mot de passe.</p>
            <div class="question-box" id="display_question">-- Chargement --</div>
            <div class="form-group">
                <label>Votre réponse</label>
                <div class="input-wrapper">
                    <input type="text" id="secret_answer" placeholder="Votre réponse ici" class="input-clean">
                </div>
            </div>
            <button onclick="verifyAnswer()" id="btnStep2" class="btn-primary">Confirmer</button>
        </div>

        <!-- Étape 3 : Nouveau Mot de Passe -->
        <div id="step3" class="step-container">
            <h2>Nouveau Mot de Passe</h2>
            <p>Définissez votre nouveau code d'accès sécurisé.</p>
            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <div class="input-wrapper">
                    <input type="password" id="new_pass" placeholder="8 caractères minimum" class="input-clean">
                </div>
            </div>
            <div class="form-group">
                <label>Confirmer</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm_new_pass" placeholder="Répétez le mot de passe" class="input-clean">
                </div>
            </div>
            <button onclick="resetPassword()" id="btnStep3" class="btn-primary">Mettre à jour</button>
        </div>
    </div>

    <script>
        let currentEmail = "";
        let expectedAnswer = "";

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.backgroundColor = type === 'error' ? '#ef4444' : '#009460';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function fetchQuestion() {
            const id = document.getElementById('target_id').value.trim();
            if (!id) return showToast("Veuillez saisir un identifiant.", "error");

            const btn = document.getElementById('btnStep1');
            btn.disabled = true; btn.textContent = "Recherche...";

            try {
                // On utilise findEmailFromIdentifier pour avoir l'email technique
                const email = await window.findEmailFromIdentifier(id);
                if (!email) throw new Error("Compte introuvable.");

                currentEmail = email;

                // On cherche la question dans la table profiles via Supabase
                const { data, error } = await window.supabase
                    .from('profiles')
                    .select('secret_question, secret_answer')
                    .eq('email', email)
                    .single();

                if (error || !data) throw new Error("Impossible de récupérer la question.");

                document.getElementById('display_question').textContent = data.secret_question;
                expectedAnswer = data.secret_answer;

                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
            } catch (err) {
                showToast(err.message, "error");
            } finally {
                btn.disabled = false; btn.textContent = "Vérifier";
            }
        }

        function verifyAnswer() {
            const ans = document.getElementById('secret_answer').value.trim().toLowerCase();
            if (!ans) return showToast("Veuillez saisir votre réponse.", "error");

            if (ans === expectedAnswer.toLowerCase()) {
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
            } else {
                showToast("Réponse incorrecte.", "error");
            }
        }

        async function resetPassword() {
            const p1 = document.getElementById('new_pass').value;
            const p2 = document.getElementById('confirm_new_pass').value;

            if (p1.length < 8) return showToast("Le mot de passe doit faire 8 caractères.", "error");
            if (p1 !== p2) return showToast("Les mots de passe ne correspondent pas.", "error");

            const btn = document.getElementById('btnStep3');
            btn.disabled = true; btn.textContent = "Mise à jour...";

            try {
                // Dans un flux statique sans Edge Functions, 
                // le reset de mot de passe Supabase nécessite normalement un token email.
                // Alternative : On utilise une méthode de service ou on informe l'utilisateur.
                // Ici, pour la démo, on simule l'appel Supabase. 
                // NOTE: Pour que ça marche en réel sans email, il faudrait une Policy Supabase 
                // permettant l'UPDATE du mot de passe si secret_answer est fourni.
                
                showToast("Mot de passe mis à jour ! Redirection...", "success");
                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (err) {
                showToast(err.message, "error");
            } finally {
                btn.disabled = false; btn.textContent = "Mettre à jour";
            }
        }
    </script>
</body>
</html>
