<!DOCTYPE html>
<html lang="fr" class="theme-clair clair">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Profil | N'Ka Wari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/core.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="theme-clair clair">
    <div class="topbar">
        <button onclick="window.history.back()" style="background:none; border:none; cursor:pointer;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span style="font-weight:700;">Mon Profil</span>
        <button onclick="logoutFromSupabase()" style="color:#ef4444; background:none; border:none; font-weight:700;">Déconnexion</button>
    </div>

    <div class="app-container" style="padding-top: 30px;">
        <div class="profile-header" style="text-align: center; margin-bottom: 40px;">
            <div style="width: 100px; height: 100px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #64748b;">👤</div>
            <h2 id="fullName" style="margin:0;">Utilisateur</h2>
            <p id="emailLabel" style="color:#64748b; font-size: 14px;">---</p>
        </div>

        <div class="profile-stats" style="display: flex; gap: 15px; margin-bottom: 30px;">
            <div style="flex:1; background: #fff; padding: 20px; border-radius: 18px; border: 1.5px solid #e2e8f0; text-align:center;">
                <h4 style="margin:0; font-size:12px; opacity:0.6;">Karfa</h4>
                <p style="font-weight:800; font-size:20px; color:#10b981;">0</p>
            </div>
            <div style="flex:1; background: #fff; padding: 20px; border-radius: 18px; border: 1.5px solid #e2e8f0; text-align:center;">
                <h4 style="margin:0; font-size:12px; opacity:0.6;">Dettes</h4>
                <p style="font-weight:800; font-size:20px; color:#ef4444;">0</p>
            </div>
        </div>

        <div class="menu-list" style="background: #fff; border-radius: 18px; border: 1.5px solid #e2e8f0; overflow:hidden;">
            <div style="padding: 18px; border-bottom: 1.5px solid #f1f5f9; display: flex; justify-content: space-between;">
                <span>Modifier mon profil</span>
                <span>→</span>
            </div>
            <div style="padding: 18px; border-bottom: 1.5px solid #f1f5f9; display: flex; justify-content: space-between;" onclick="window.location.href='pin-setup.html'">
                <span>Sécurité & PIN</span>
                <span>→</span>
            </div>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkSession();
            if (user) {
                document.getElementById('fullName').textContent = (user.user_metadata.first_name || "") + " " + (user.user_metadata.last_name || "");
                document.getElementById('emailLabel').textContent = user.email;
            }
        });
    </script>
</body>
</html>
