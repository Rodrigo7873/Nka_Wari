<div id="customConfirmModal" class="modal-backdrop"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 9999; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s ease;">
    <div class="modal-card"
        style="background: white; border-radius: 20px; width: 90%; max-width: 400px; padding: 30px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); transform: scale(0.9); transition: transform 0.2s ease;">
        <div style="text-align: center;">
            <div id="modalIconContainer"
                style="width: 60px; height: 60px; border-radius: 50%; background: #fef2f2; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <svg id="modalIconWarning" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#ef4444"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                    </path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <svg id="modalIconInfo" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#3b82f6"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
            </div>

            <h2 id="modalTitle" style="margin: 0 0 10px 0; font-size: 20px; font-weight: 700; color: #1e293b;">
                Confirmation</h2>
            <p id="modalMessage" style="margin: 0 0 30px 0; font-size: 15px; color: #64748b; line-height: 1.5;">
                Voulez-vous vraiment effectuer cette action ?</p>

            <div style="display: flex; gap: 12px;">
                <button id="modalCancelBtn"
                    style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; color: #64748b; font-weight: 600; cursor: pointer; transition: all 0.2s;">
                    Annuler
                </button>
                <button id="modalConfirmBtn"
                    style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: #ef4444; color: white; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);">
                    Confirmer
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById('customConfirmModal');
    const modalCard = modal.querySelector('.modal-card');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalConfirmBtn = document.getElementById('modalConfirmBtn');
    const modalCancelBtn = document.getElementById('modalCancelBtn');
    const iconWarning = document.getElementById('modalIconWarning');
    const iconInfo = document.getElementById('modalIconInfo');
    const iconContainer = document.getElementById('modalIconContainer');

    let currentForm = null;

    function openConfirmModal(options) {
        const { title, message, onConfirm, isDanger = true, form = null } = options;

        modalTitle.innerText = title || 'Confirmation';
        modalMessage.innerText = message || 'Êtes-vous sûr ?';
        currentForm = form;

        if (isDanger) {
            modalConfirmBtn.style.background = '#ef4444';
            modalConfirmBtn.style.boxShadow = '0 4px 6px -1px rgba(239, 68, 68, 0.2)';
            iconWarning.style.display = 'block';
            iconInfo.style.display = 'none';
            iconContainer.style.background = '#fef2f2';
        } else {
            modalConfirmBtn.style.background = '#10b981';
            modalConfirmBtn.style.boxShadow = '0 4px 6px -1px rgba(16, 185, 129, 0.2)';
            iconWarning.style.display = 'none';
            iconInfo.style.display = 'block';
            iconContainer.style.background = '#f0fdf4';
            iconInfo.setAttribute('stroke', '#10b981');
        }

        modal.style.display = 'flex';
        // Force reflow
        modal.offsetHeight;
        modal.style.opacity = '1';
        modalCard.style.transform = 'scale(1)';

        modalConfirmBtn.onclick = () => {
            if (currentForm) {
                currentForm.submit();
            } else if (onConfirm) {
                onConfirm();
            }
            closeConfirmModal();
        };
    }

    function closeConfirmModal() {
        modal.style.opacity = '0';
        modalCard.style.transform = 'scale(0.9)';
        setTimeout(() => {
            modal.style.display = 'none';
        }, 200);
    }

    modalCancelBtn.onclick = closeConfirmModal;
    modal.onclick = (e) => {
        if (e.target === modal) closeConfirmModal();
    };

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') {
            closeConfirmModal();
        }
    });

    // Delegated listener for confirm buttons
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-confirm]');
        if (btn) {
            e.preventDefault();
            const message = btn.getAttribute('data-confirm');
            const isDanger = btn.getAttribute('data-confirm-type') !== 'success';
            const form = btn.closest('form');
            const href = btn.getAttribute('href') || (btn.tagName === 'A' ? btn.href : null);

            openConfirmModal({
                message: message,
                isDanger: isDanger,
                onConfirm: () => {
                    if (form) {
                        form.submit();
                    } else if (href) {
                        window.location.href = href;
                    }
                }
            });
        }
    });
</script>
