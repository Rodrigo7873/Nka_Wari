        </button>

    <div class="menu-content">

</div>
<div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>

<style>
    .side-menu {
        position: fixed;
        top: 0;
        left: -320px;
        width: 100%;
        max-width: 300px;
        height: 100vh;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        transition: left 0.3s ease;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(10px);
    }

    .side-menu.open {
        left: 0;
    }

    .menu-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        border-bottom: 1px solid #edf2f7;
    }

    .menu-header h2 {
        margin: 0;
        font-size: 20px;
        color: #1e2b3c;
    }

    .close-btn {
        background: none;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #64748b;
        transition: all 0.2s;
        width: 40px;
        height: 40px;
        border-radius: 50%;
    }

    .close-btn:hover {
        background: #fef2f2;
        color: #ef4444;
    }

    .menu-content {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .menu-item {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 12px 15px;
        border-radius: 12px;
        text-decoration: none;
        color: #1e2b3c;
        font-weight: 500;
        transition: all 0.2s;
    }

    .menu-item:hover {
        background: #f1f5f9;
        transform: translateX(5px);
    }

    .menu-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #64748b;
    }

    .menu-logout .menu-icon {
        color: #ef4444;
    }

    .menu-logout {
        color: #ef4444;
        margin-top: auto; /* Push bottom if needed */
        border: 1px solid #fee2e2;
        background: #fef2f2;
    }

    .menu-logout:hover {
        background: #fee2e2;
    }

    .menu-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
    }

    .menu-overlay.open {
        opacity: 1;
        visibility: visible;
    }
</style>

<script>
    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('menuOverlay').classList.toggle('open');
        
        // Disable scroll on body when menu is open
        if(document.getElementById('sideMenu').classList.contains('open')) {
            document.body.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = '';
        }
    }
</script>
