{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/parametres.css' %}?v=1.1">

<div class="parametres-wrapper">
    <!-- Header -->
    <div class="param-header">
        <div class="header-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="header-text">
            <h1>Configuration</h1>
            <p>Personnalisez votre expérience N'ka Wari</p>
        </div>
    </div>



    <!-- Section Notifications -->
    <div class="settings-group">
        <h2 class="group-title">Système</h2>
        <div class="settings-card">
            <div class="setting-row">
                <div class="setting-info">
                    <span class="setting-icon notif-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                    </span>
                    <div class="setting-text">
                        <span class="label">Notifications</span>
                        <span class="description">Alertes et messages importants</span>
                    </div>
                </div>
                <label class="premium-switch">
                    <input type="checkbox" {% if params.notifications_activees %}checked{% endif %} onchange="updateNotificationPref(event, this)">
                    <span class="premium-slider"></span>
                </label>
            </div>
        </div>
    </div>

    <!-- Section À Propos -->
    <div class="settings-group">
        <a href="{% url 'about' %}" class="settings-card about-card" style="text-decoration: none; display: block;">
            <div class="setting-row">
                <div class="setting-info">
                    <span class="setting-icon info-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    </span>
                    <div class="setting-text">
                        <span class="label">À propos</span>
                        <span class="description">Version v{{ params.version }}</span>
                    </div>
                </div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--param-text-muted)"><path d="m9 18 6-6-6-6"/></svg>
            </div>
        </a>
    </div>
</div>

<script src="{% static 'js/parametres.js' %}?v=1.1"></script>
{% endblock %}
