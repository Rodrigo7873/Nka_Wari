{% extends "base.html" %}
{% load static %}
{% load custom_filters %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/dettes.css' %}">

<div class="form-page">
    <div class="form-container">

        <!-- Header -->
        <div class="form-header">
            <div class="form-header-icon icon-je-dois"
                style="background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
            </div>
            <div class="form-header-text">
                <h1>Rembourser la Dette</h1>
                <p>Envoyer un paiement à <strong>{{ dette.personne }}</strong></p>
            </div>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <form method="post">
                {% csrf_token %}

                <!-- Info Dette Actuelle -->
                <div style="background: #fff5f5; border: 1px solid #fee2e2; border-radius: 12px; padding: 12px 15px; margin-bottom: 25px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: nowrap;">
                        <span style="color: #991b1b; font-size: 13px; font-weight: 600; white-space: nowrap;">Reste à payer :</span>
                        <span style="color: #dc2626; font-size: clamp(14px, 4vw, 18px); font-weight: 700; white-space: nowrap;">{{ dette.montant_restant|milliers }} GNF</span>
                    </div>
                </div>

                <!-- Montant à rembourser -->
                <div class="field-group">
                    <label class="field-label" for="montant">
                        Montant remboursé (GNF) <span class="required">*</span>
                    </label>
                    <div class="amount-wrapper">
                        <span class="amount-prefix">GNF</span>
                        <input class="field-input" type="text" id="montant" name="montant"
                            value="{{ dette.montant_restant }}" required inputmode="numeric" oninput="formatMontant(this)">
                    </div>

                </div>

                <!-- Mode de remboursement -->
                <div class="field-group">
                    <label class="field-label">Mode de règlement <span class="required">*</span></label>
                    <div style="display: flex; gap: 15px; margin-top: 8px;">
                        <label style="flex: 1; cursor: pointer;">
                            <input type="radio" name="mode_paiement" value="especes" checked 
                                   onchange="document.getElementById('compte_select_div').style.display='none'; document.getElementById('compte_id').required=false;"
                                   style="margin-right: 8px;">
                            <span style="font-size: 14px; font-weight: 500; ">💵 Espèces</span>
                        </label>
                        <label style="flex: 1; cursor: pointer;">
                            <input type="radio" name="mode_paiement" value="compte" 
                                   onchange="document.getElementById('compte_select_div').style.display='block'; document.getElementById('compte_id').required=true;"
                                   style="margin-right: 8px;">
                            <span style="font-size: 14px; font-weight: 500; ">💳 Compte</span>
                        </label>
                    </div>
                </div>

                <!-- Sélection du compte (caché par défaut) -->
                <div id="compte_select_div" class="field-group" style="display: none; animation: fadeIn 0.2s ease;">
                    <label class="field-label" for="compte_id">Choisir le compte à débiter</label>
                    <select name="compte_id" id="compte_id" class="field-input">
                        <option value="">-- Sélectionner un compte --</option>
                        {% for compte in comptes %}
                        <option value="{{ compte.id }}">{{ compte.nom }} ({{ compte.solde|milliers }} GNF)</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Note -->
                <div class="field-group">
                    <label class="field-label" for="note">
                        Note <span class="field-hint">— optionnelle</span>
                    </label>
                    <textarea class="field-input" id="note" name="note" rows="2"
                        placeholder="Ex: Remboursement partiel par virement..."></textarea>
                </div>

                <!-- Actions -->
                <div class="form-actions">
                    <a href="{% url 'dettes:detail_dette' dette.id %}" class="btn-cancel">Annuler</a>
                    <button type="submit" class="btn-submit"
                        style="background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                            <polyline points="22 4 12 14.01 9 11.01" />
                        </svg>
                        Confirmer le remboursement
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
