{% extends "base.html" %}

{% block content %}
<h1>Nouvelle Dette / Créance</h1>

<form method="post" style="margin-top: 30px;">
    {% csrf_token %}

    <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Type</label>
        <select name="sens" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            <option value="JE_DOIS">Je dois</option>
            <option value="ON_ME_DOIT">On me doit</option>
        </select>
    </div>

    <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Personne <span style="color: red;">*</span></label>
        <input type="text" name="personne" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
    </div>

    <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Montant (GNF) <span style="color: red;">*</span></label>
        <input type="number" name="montant" required min="1" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
    </div>

    <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Motif (optionnel)</label>
        <textarea name="motif" rows="3" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;"></textarea>
    </div>

    <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Échéance (optionnelle)</label>
        <input type="date" name="echeance" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
    </div>

    <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Garantie (optionnelle)</label>
        <textarea name="garantie" rows="2" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;"></textarea>
    </div>

    <button type="submit" 
        style="width: 100%; background: #10b981; color: white; padding: 14px 28px; border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);"
        onmouseover="this.style.background='#059669'; this.style.transform='translateY(-2px)';"
        onmouseout="this.style.background='#10b981'; this.style.transform='translateY(0)';"
    >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        Enregistrer la dette
    </button>
</form>
{% endblock %}
