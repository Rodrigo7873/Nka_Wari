{% extends "base.html" %}

{% block content %}
    <h1>Créer un nouveau Karfa</h1>

    <form method="post">
        {% csrf_token %}

        <div style="margin-bottom: 20px;">
            <label for="beneficiaire" style="display: block; font-weight: bold; margin-bottom: 5px;">
                Bénéficiaire <span style="color: red;">*</span>
            </label>
            <input type="text" id="beneficiaire" name="beneficiaire" required
                   style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label for="montant" style="display: block; font-weight: bold; margin-bottom: 5px;">
                Montant (GNF) <span style="color: red;">*</span>
            </label>
            <input type="number" id="montant" name="montant" required min="1"
                   style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label for="motif" style="display: block; font-weight: bold; margin-bottom: 5px;">
                Motif (optionnel)
            </label>
            <textarea id="motif" name="motif" rows="4"
                      style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;"></textarea>
        </div>

        <button type="submit"
                style="background: #27ae60; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">
            Créer Karfa
        </button>
    </form>
{% endblock %}
