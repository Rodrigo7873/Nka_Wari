{% extends "base.html" %}

{% block title %}Créer un nouveau Karfa{% endblock %}

{% block content %}
<div class="container">
    <h1>Créer un nouveau Karfa</h1>

    <form method="post">
        {% csrf_token %}

        <!-- Champ Bénéficiaire -->
        <div class="form-group">
            <label for="beneficiaire">Bénéficiaire <span class="required">*</span></label>
            <input 
                type="text" 
                id="beneficiaire" 
                name="beneficiaire" 
                placeholder="Nom du bénéficiaire"
                required
                class="form-control"
                value="test"
            >
        </div>

        <!-- Champ Montant -->
        <div class="form-group">
            <label for="montant">Montant (GNF) <span class="required">*</span></label>
            <input 
                type="number" 
                id="montant" 
                name="montant" 
                placeholder="0"
                min="1"
                required
                class="form-control"
                value="50000"
            >
        </div>

        <!-- Champ Motif -->
        <div class="form-group">
            <label for="motif">Motif (optionnel)</label>
            <textarea 
                id="motif" 
                name="motif" 
                class="form-control" 
                placeholder="Raison du dépôt..."
                rows="3"
            >Dépôt test</textarea>
        </div>

        <!-- Bouton -->
        <button type="submit" class="btn btn-success btn-lg">
            Créer Karfa
        </button>
    </form>
</div>
{% endblock %}
