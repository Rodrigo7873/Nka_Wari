{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/karfa.css' %}">

<div class="form-page">
    <div class="form-container">

        <!-- Header -->
        <div class="form-header">
            <div class="form-header-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m11 17 2 2a1 1 0 1 0 3-3" />
                    <path
                        d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-7.3 7.3a1 1 0 0 0 0 1.42l.5.5a1 1 0 0 0 1.42 0l7.3-7.3a3 3 0 0 1 4.24 0l3.88 3.88a1 1 0 0 1 0 1.42l-.5.5a1 1 0 0 1-1.42 0l-2.5-2.5" />
                    <path d="m11.5 10.5-2-2" />
                    <path d="m15 14-2-2" />
                    <path d="m16.5 15.5-2-2" />
                </svg>
            </div>
            <div class="form-header-text">
                <h1>Nouveau Karfa</h1>
                <p>Enregistrez un nouvel engagement financier</p>
            </div>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <form method="post">
                {% csrf_token %}

                <!-- Bénéficiaire -->
                <div class="field-group">
                    <label class="field-label" for="beneficiaire">
                        Bénéficiaire <span class="required">*</span>
                    </label>
                    <input class="field-input" type="text" id="beneficiaire" name="beneficiaire"
                        placeholder="Nom de la personne" required autocomplete="off">
                </div>

                <!-- Montant -->
                <div class="field-group">
                    <label class="field-label" for="montant">
                        Montant <span class="required">*</span>
                    </label>
                    <div class="amount-wrapper">
                        <span class="amount-prefix">GNF</span>
                        <input class="field-input" type="number" id="montant" name="montant" placeholder="0" required
                            min="1">
                        <span class="amount-suffix">F</span>
                    </div>
                </div>

                <hr class="form-divider">

                <!-- Motif -->
                <div class="field-group">
                    <label class="field-label" for="motif">
                        Motif <span class="field-hint">— optionnel</span>
                    </label>
                    <textarea class="field-input" id="motif" name="motif"
                        placeholder="Raison de cet engagement..."></textarea>
                </div>

                <!-- Actions -->
                <div class="form-actions">
                    <a href="{% url 'karfa:karfa_list' %}" class="btn-cancel">Annuler</a>
                    <button type="submit" class="btn-submit">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5" />
                        </svg>
                        Créer le Karfa
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
