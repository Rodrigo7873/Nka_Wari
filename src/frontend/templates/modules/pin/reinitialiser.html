{% extends "base.html" %}

{% block content %}
<div class="pin-container animate-fade-in">
    <div class="pin-card-premium glass-card">
        <div class="pin-status-icon warning">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                <path d="M12 8v4"></path>
                <path d="M12 16h.01"></path>
            </svg>
        </div>
        
        <h1 class="pin-title">Identité requise</h1>
        <p class="pin-subtitle">Saisissez votre mot de passe pour réinitialiser le code PIN.</p>

        <form method="post" class="mt-4">
            {% csrf_token %}
            
            <div class="input-premium-group mb-5">
                <label class="label-premium">Mot de passe du compte</label>
                <div class="input-with-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" name="password" class="input-premium" required placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn-premium-action mb-3">Vérifier et Réinitialiser</button>
            <a href="{% url 'core:verifier_pin' %}" class="btn-link-premium">Annuler</a>
        </form>
    </div>
</div>

<style>
    .input-premium-group { text-align: left; }
    .label-premium { font-weight: 700; font-size: 0.85rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: block; }
    .input-with-icon { position: relative; display: flex; align-items: center; }
    .input-with-icon svg { position: absolute; left: 15px; color: #adb5bd; }
    .input-premium { 
        width: 100%; padding: 16px 16px 16px 45px; border-radius: 16px; border: 2px solid #f1f3f5; background: #f8f9fa; 
        font-size: 1rem; transition: all 0.3s;
    }
    .input-premium:focus { border-color: #4a6cf7; background: #fff; outline: none; box-shadow: 0 0 20px rgba(74,108,247,0.1); }
    .pin-status-icon.warning { background: #fff8f0; color: #ff9500; }
</style>
{% endblock %}
